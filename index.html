<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CSPM — Cloud Security Posture</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04080f;--surface:#080f1a;--surface2:#0c1525;
  --border:#112030;--border2:#1a304a;
  --text:#a8c4d8;--bright:#e0eef8;--muted:#3a5570;
  --accent:#0af0b0;--accent2:#00aaff;
  --critical:#ff2952;--high:#ff7730;--medium:#ffcc44;--low:#0af0b0;
  --resolved:#7b61ff;
  --mono:'IBM Plex Mono',monospace;--sans:'Syne',sans-serif;
}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(10,240,176,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(10,240,176,.025) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;z-index:0}
#root{position:relative;z-index:1;min-height:100vh}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-glow{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;
  background:radial-gradient(circle,rgba(10,240,176,.07) 0%,transparent 65%);pointer-events:none}
.login-box{background:var(--surface);border:1px solid var(--border2);border-radius:4px;
  padding:48px 40px;width:100%;max-width:400px;position:relative;animation:fadeUp .5s ease both}
.login-box::before,.login-box::after{content:'';position:absolute;width:20px;height:20px}
.login-box::before{top:-1px;left:-1px;border-top:2px solid var(--accent);border-left:2px solid var(--accent)}
.login-box::after{bottom:-1px;right:-1px;border-bottom:2px solid var(--accent);border-right:2px solid var(--accent)}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.login-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
.login-title{font-size:22px;font-weight:700;color:var(--bright);margin-bottom:6px}
.login-sub{font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.form-label{display:block;font-family:var(--mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.form-input{width:100%;background:var(--bg);border:1px solid var(--border2);color:var(--bright);
  padding:12px 14px;font-family:var(--mono);font-size:13px;border-radius:2px;outline:none;margin-bottom:16px;
  transition:border-color .2s,box-shadow .2s}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 1px rgba(10,240,176,.18)}
.form-input::placeholder{color:var(--muted)}
.btn-primary{width:100%;padding:14px;background:var(--accent);color:#04080f;border:none;border-radius:2px;
  font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;
  cursor:pointer;margin-top:4px;transition:all .2s}
.btn-primary:hover{background:#2fffc0;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.alert{padding:10px 14px;border-radius:2px;font-family:var(--mono);font-size:10px;margin-bottom:16px}
.alert-err{background:rgba(255,41,82,.1);border:1px solid rgba(255,41,82,.3);color:var(--critical)}
.alert-info{background:rgba(10,240,176,.06);border:1px solid rgba(10,240,176,.2);color:var(--accent)}
.alert-warn{background:rgba(255,119,48,.08);border:1px solid rgba(255,119,48,.3);color:var(--high)}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:52px;
  border-bottom:1px solid var(--border);background:rgba(4,8,15,.95);backdrop-filter:blur(16px);
  position:sticky;top:0;z-index:100;min-width:0;overflow:visible}
.nav-brand{font-family:var(--mono);font-size:12px;letter-spacing:.25em;text-transform:uppercase;
  color:var(--accent);display:flex;align-items:center;gap:8px;flex-shrink:0}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);
  box-shadow:0 0 8px var(--accent);animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.nav-info{font-family:var(--mono);font-size:10px;color:var(--muted);
  border-left:1px solid var(--border);padding-left:12px;margin-left:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.nav-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.nav-user{font-family:var(--mono);font-size:10px;color:var(--muted);padding:4px 10px;
  border:1px solid var(--border);border-radius:2px}
.btn-sm{padding:5px 14px;background:transparent;border:1px solid var(--border2);color:var(--muted);
  border-radius:2px;cursor:pointer;font-family:var(--mono);font-size:10px;letter-spacing:.1em;transition:all .15s}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}

/* LAYOUT */
main{padding:24px 32px;max-width:1600px;margin:0 auto}
.fade-in{animation:fadeIn .4s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* BANNER */
.banner{display:grid;grid-template-columns:240px 1fr;gap:14px;margin-bottom:14px}
.score-card{background:var(--surface);border:1px solid var(--border2);border-radius:4px;
  padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-ring{position:relative;width:110px;height:110px;margin-bottom:10px}
.score-ring svg{transform:rotate(-90deg)}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-num{font-family:var(--mono);font-size:30px;font-weight:600;line-height:1}
.score-num.good{color:var(--low)}.score-num.warn{color:var(--medium)}.score-num.danger{color:var(--critical)}
.score-of{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.15em}
.score-title{font-family:var(--mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);text-align:center}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat-card{background:var(--surface);border:1px solid var(--border2);border-radius:4px;padding:18px 20px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px}
.stat-card.c::before{background:var(--critical);box-shadow:0 0 10px var(--critical)}
.stat-card.h::before{background:var(--high);box-shadow:0 0 10px var(--high)}
.stat-card.m::before{background:var(--medium);box-shadow:0 0 10px var(--medium)}
.stat-card.t::before{background:var(--accent2);box-shadow:0 0 10px var(--accent2)}
.stat-card.r::before{background:var(--resolved);box-shadow:0 0 10px var(--resolved)}
.stat-label{font-family:var(--mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.stat-val{font-family:var(--mono);font-size:44px;font-weight:600;line-height:1}
.stat-card.c .stat-val{color:var(--critical)}.stat-card.h .stat-val{color:var(--high)}
.stat-card.m .stat-val{color:var(--medium)}.stat-card.t .stat-val{color:var(--accent2)}
.stat-card.r .stat-val{color:var(--resolved)}
.stat-tag{position:absolute;bottom:14px;right:14px;font-family:var(--mono);font-size:9px;color:var(--muted)}

/* CHARTS */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.card{background:var(--surface);border:1px solid var(--border2);border-radius:4px;padding:24px}
.card-title{font-family:var(--mono);font-size:9px;letter-spacing:.25em;text-transform:uppercase;
  color:var(--muted);margin-bottom:20px;display:flex;align-items:center;gap:8px}
.card-title::before{content:'';display:inline-block;width:3px;height:12px;background:var(--accent);border-radius:2px}

/* TABS */
.tabs{display:flex;gap:2px;margin-bottom:12px;border-bottom:1px solid var(--border)}
.tab{padding:8px 20px;font-family:var(--mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;
  color:var(--muted);background:transparent;border:none;cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.tab-count{display:inline-flex;align-items:center;justify-content:center;
  width:18px;height:18px;border-radius:100px;font-size:9px;margin-left:6px;
  background:rgba(10,240,176,.1);color:var(--accent)}
.tab-count.danger{background:rgba(255,41,82,.1);color:var(--critical)}

/* TABLE */
.tbl-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:10px}
.tbl-count{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.12em}
.filters{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.sep{width:1px;height:14px;background:var(--border2);margin:0 2px}
.pill{padding:3px 11px;border-radius:100px;border:1px solid var(--border2);background:transparent;
  color:var(--muted);font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.pill:hover{border-color:var(--text);color:var(--text)}
.pill.on{border-color:var(--accent);color:var(--accent);background:rgba(10,240,176,.06)}
.pill.c.on{border-color:var(--critical);color:var(--critical);background:rgba(255,41,82,.06)}
.pill.h.on{border-color:var(--high);color:var(--high);background:rgba(255,119,48,.06)}
.pill.m.on{border-color:var(--medium);color:var(--medium);background:rgba(255,204,68,.06)}
.tbl-wrap{background:var(--surface);border:1px solid var(--border2);border-radius:4px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--surface2);border-bottom:1px solid var(--border2)}
th{padding:10px 16px;text-align:left;font-family:var(--mono);font-size:9px;letter-spacing:.2em;
  text-transform:uppercase;color:var(--muted);font-weight:400;white-space:nowrap}
tbody tr{border-bottom:1px solid rgba(17,32,48,.8);transition:background .1s}
tbody tr:hover{background:var(--surface2)}
tbody tr:last-child{border-bottom:none}
td{padding:10px 16px;font-size:12px;color:var(--text);vertical-align:middle}
.mono{font-family:var(--mono);font-size:11px}.dim{color:var(--muted)}
.sev{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:2px;
  font-family:var(--mono);font-size:9px;letter-spacing:.1em;font-weight:600}
.sev::before{content:'';width:5px;height:5px;border-radius:50%}
.sev.CRITICAL{background:rgba(255,41,82,.12);color:var(--critical);border:1px solid rgba(255,41,82,.25)}
.sev.CRITICAL::before{background:var(--critical);box-shadow:0 0 4px var(--critical)}
.sev.HIGH{background:rgba(255,119,48,.12);color:var(--high);border:1px solid rgba(255,119,48,.25)}
.sev.HIGH::before{background:var(--high)}
.sev.MEDIUM{background:rgba(255,204,68,.12);color:var(--medium);border:1px solid rgba(255,204,68,.25)}
.sev.MEDIUM::before{background:var(--medium)}
.sev.LOW{background:rgba(10,240,176,.1);color:var(--low);border:1px solid rgba(10,240,176,.2)}
.sev.LOW::before{background:var(--low)}
.st-open{color:var(--critical);font-family:var(--mono);font-size:9px;letter-spacing:.1em}
.st-resolved{color:var(--resolved);font-family:var(--mono);font-size:9px;letter-spacing:.1em}

/* ACTION BUTTONS */
.btn-action{padding:4px 12px;border-radius:2px;font-family:var(--mono);font-size:9px;
  letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border:1px solid;transition:all .15s;white-space:nowrap}
.btn-remediate{color:var(--accent);border-color:rgba(10,240,176,.3);background:rgba(10,240,176,.05)}
.btn-remediate:hover{background:rgba(10,240,176,.12);border-color:var(--accent)}
.btn-rollback{color:var(--resolved);border-color:rgba(123,97,255,.3);background:rgba(123,97,255,.05)}
.btn-rollback:hover{background:rgba(123,97,255,.12);border-color:var(--resolved)}
.btn-pending{color:var(--medium);border-color:rgba(255,204,68,.3);background:rgba(255,204,68,.05);cursor:default}
.btn-action:disabled{opacity:.4;cursor:not-allowed}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(4,8,15,.9);backdrop-filter:blur(6px);
  z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn .15s ease}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:4px;
  padding:36px;width:100%;max-width:540px;position:relative}
.modal::before{content:'';position:absolute;top:-1px;left:-1px;width:28px;height:28px;
  border-top:2px solid var(--accent);border-left:2px solid var(--accent)}
.modal-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}
.modal-rule{font-family:var(--mono);font-size:15px;color:var(--bright);margin-bottom:8px}
.modal-x{background:transparent;border:1px solid var(--border2);color:var(--muted);
  width:28px;height:28px;border-radius:2px;cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.modal-x:hover{border-color:var(--critical);color:var(--critical)}
.modal-row{display:flex;justify-content:space-between;align-items:flex-start;
  padding:10px 0;border-bottom:1px solid var(--border);gap:16px}
.modal-row:last-child{border-bottom:none}
.modal-k{font-family:var(--mono);font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);flex-shrink:0;margin-top:1px}
.modal-v{font-family:var(--mono);font-size:11px;color:var(--bright);text-align:right;word-break:break-all}
.action-box{background:var(--bg);border:1px solid var(--border2);border-radius:2px;
  padding:14px;margin:16px 0;font-family:var(--mono);font-size:11px;color:var(--text);line-height:1.6}
.action-box-label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.warn-box{background:rgba(255,119,48,.06);border:1px solid rgba(255,119,48,.2);border-radius:2px;
  padding:12px 14px;margin-bottom:16px;font-family:var(--mono);font-size:10px;color:var(--high);line-height:1.5}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.btn-confirm{flex:1;padding:12px;border:none;border-radius:2px;font-family:var(--mono);
  font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-confirm.go{background:var(--accent);color:#04080f}
.btn-confirm.go:hover{background:#2fffc0}
.btn-confirm.go.danger{background:var(--critical);color:#fff}
.btn-confirm.go.danger:hover{background:#ff4d6a}
.btn-confirm.go.purple{background:var(--resolved);color:#fff}
.btn-confirm.go.purple:hover{background:#9b85ff}
.btn-confirm.cancel{background:transparent;border:1px solid var(--border2);color:var(--muted)}
.btn-confirm.cancel:hover{border-color:var(--text);color:var(--text)}
.btn-confirm:disabled{opacity:.5;cursor:not-allowed}

/* TOAST */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:300;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;border-radius:4px;font-family:var(--mono);font-size:11px;
  letter-spacing:.05em;animation:toastIn .3s ease;min-width:280px;
  display:flex;align-items:center;gap:10px}
.toast.success{background:#0c1a14;border:1px solid rgba(10,240,176,.3);color:var(--accent)}
.toast.error{background:#1a0c10;border:1px solid rgba(255,41,82,.3);color:var(--critical)}
.toast.info{background:#0c1220;border:1px solid rgba(0,170,255,.3);color:var(--accent2)}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}


/* SETTINGS PANEL */
.settings-btn{padding:5px 14px;background:transparent;border:1px solid var(--border2);color:var(--muted);
  border-radius:2px;cursor:pointer;font-family:var(--mono);font-size:10px;letter-spacing:.1em;transition:all .15s}
.settings-btn:hover{border-color:var(--accent);color:var(--accent)}
.settings-panel{background:var(--surface);border:1px solid var(--border2);border-radius:4px;
  padding:24px;margin-bottom:14px;animation:fadeIn .3s ease}
.settings-title{font-family:var(--mono);font-size:9px;letter-spacing:.25em;text-transform:uppercase;
  color:var(--muted);margin-bottom:20px;display:flex;align-items:center;gap:8px}
.settings-title::before{content:'';display:inline-block;width:3px;height:12px;background:var(--accent);border-radius:2px}
.setting-row{display:flex;align-items:flex-start;justify-content:space-between;
  padding:16px 0;border-bottom:1px solid var(--border);gap:24px}
.setting-row:last-child{border-bottom:none}
.setting-info{flex:1}
.setting-label{font-family:var(--mono);font-size:12px;color:var(--bright);margin-bottom:4px}
.setting-desc{font-family:var(--mono);font-size:10px;color:var(--muted);line-height:1.5}
.setting-warn{font-family:var(--mono);font-size:10px;color:var(--high);margin-top:4px}
.toggle-wrap{display:flex;align-items:center;gap:10px;flex-shrink:0}
.toggle{position:relative;width:44px;height:24px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;background:var(--border2);border-radius:100px;
  transition:background .2s;border:1px solid var(--border2)}
.toggle input:checked + .toggle-track{background:var(--accent);border-color:var(--accent)}
.toggle-thumb{position:absolute;top:3px;left:3px;width:16px;height:16px;background:var(--muted);
  border-radius:50%;transition:transform .2s,background .2s}
.toggle input:checked ~ .toggle-thumb{transform:translateX(20px);background:#04080f}
.toggle-label{font-family:var(--mono);font-size:10px;letter-spacing:.1em}
.toggle-label.on{color:var(--accent)}.toggle-label.off{color:var(--muted)}
.exclusion-wrap{margin-top:12px}
.exclusion-input-row{display:flex;gap:8px;margin-bottom:10px}
.exclusion-input{flex:1;background:var(--bg);border:1px solid var(--border2);color:var(--bright);
  padding:8px 12px;font-family:var(--mono);font-size:11px;border-radius:2px;outline:none;transition:border-color .2s}
.exclusion-input:focus{border-color:var(--accent)}
.exclusion-input::placeholder{color:var(--muted)}
.exclusion-input option{background:var(--surface);color:var(--bright)}
.btn-add{padding:8px 16px;background:transparent;border:1px solid var(--border2);color:var(--muted);
  border-radius:2px;cursor:pointer;font-family:var(--mono);font-size:10px;transition:all .15s;white-space:nowrap}
.btn-add:hover{border-color:var(--accent);color:var(--accent)}
.exclusion-list{display:flex;flex-wrap:wrap;gap:6px}
.exclusion-tag{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;
  background:rgba(0,170,255,.08);border:1px solid rgba(0,170,255,.2);border-radius:100px;
  font-family:var(--mono);font-size:10px;color:var(--accent2)}
.exclusion-tag button{background:transparent;border:none;color:var(--muted);cursor:pointer;
  font-size:11px;padding:0;line-height:1;transition:color .15s}
.exclusion-tag button:hover{color:var(--critical)}


/* AUDIT LOG */
.audit-wrap{background:var(--surface);border:1px solid var(--border2);border-radius:4px;overflow:hidden;margin-top:14px}
.audit-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;
  border-bottom:1px solid var(--border2);background:var(--surface2)}
.audit-title{font-family:var(--mono);font-size:9px;letter-spacing:.25em;text-transform:uppercase;
  color:var(--muted);display:flex;align-items:center;gap:8px}
.audit-title::before{content:'';display:inline-block;width:3px;height:12px;background:var(--accent);border-radius:2px}
.audit-row{display:grid;grid-template-columns:180px 160px 140px 1fr 100px;gap:14px;
  padding:12px 20px;border-bottom:1px solid rgba(17,32,48,.6);font-family:var(--mono);font-size:12px;
  align-items:center;transition:background .1s}
.audit-row:hover{background:var(--surface2)}
.audit-row:last-child{border-bottom:none}
.audit-head{background:var(--surface2);color:var(--muted);font-size:11px;letter-spacing:.1em;
  text-transform:uppercase;border-bottom:1px solid var(--border2)}
.audit-action{display:inline-flex;padding:2px 8px;border-radius:2px;font-size:9px;letter-spacing:.1em}
.audit-action.REMEDIATED{background:rgba(10,240,176,.1);color:var(--accent);border:1px solid rgba(10,240,176,.2)}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

/* ── CONFIG ── */
const CONFIG = {
  REGION:    "ap-south-1",
  POOL_ID:   "ap-south-1_zgDedrW1K",
  CLIENT_ID: "3ls1bn9nuka7ugcmllpjo1qqno",
  API_URL:   "https://3opsd5jh0d.execute-api.ap-south-1.amazonaws.com/prod",
};
const IS_DEMO = CONFIG.CLIENT_ID.includes("XXX");

/* ── COGNITO ── */
const cognitoCall = (target, body) =>
  fetch(`https://cognito-idp.${CONFIG.REGION}.amazonaws.com/`, {
    method:"POST",
    headers:{"Content-Type":"application/x-amz-json-1.1","X-Amz-Target":`AWSCognitoIdentityProviderService.${target}`},
    body:JSON.stringify(body)
  }).then(async r=>{ const d=await r.json(); if(!r.ok) throw d; return d; });

const cognitoLogin  = (u,p)   => cognitoCall("InitiateAuth",{AuthFlow:"USER_PASSWORD_AUTH",ClientId:CONFIG.CLIENT_ID,AuthParameters:{USERNAME:u,PASSWORD:p}});
const cognitoSetPwd = (u,p,s) => cognitoCall("RespondToAuthChallenge",{ChallengeName:"NEW_PASSWORD_REQUIRED",ClientId:CONFIG.CLIENT_ID,Session:s,ChallengeResponses:{USERNAME:u,NEW_PASSWORD:p}});

/* ── HELPERS ── */
const fmt = ts => ts ? new Date(ts).toLocaleString() : "—";
const scoreClass = s => s>=80?"good":s>=50?"warn":"danger";
const SEV_ORDER  = ["CRITICAL","HIGH","MEDIUM","LOW"];
const SEV_COLORS = {CRITICAL:"#ff2952",HIGH:"#ff7730",MEDIUM:"#ffcc44",LOW:"#0af0b0"};
const SVC_COLORS = {IAM:"#00aaff",S3:"#ff7730",SG:"#ff2952",CT:"#0af0b0"};

/* ── SVG CHARTS ── */
function BarChart({ data }) {
  const W=340,H=160,pl=28,pb=28,pt=10,pr=10,iW=W-pl-pr,iH=H-pt-pb;
  const max=Math.max(...data.map(d=>d.value),1);
  const gap=iW/data.length,bw=gap*0.5;
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`}>
      {[0,Math.ceil(max/2),max].map(t=>{const y=pt+iH-(t/max)*iH;return <g key={t}>
        <line x1={pl} y1={y} x2={pl+iW} y2={y} stroke="#112030" strokeWidth="1" strokeDasharray="3,3"/>
        <text x={pl-5} y={y+4} textAnchor="end" fill="#3a5570" fontSize="9" fontFamily="IBM Plex Mono">{t}</text>
      </g>;})}
      {data.map((d,i)=>{const bh=Math.max((d.value/max)*iH,0),x=pl+i*gap+(gap-bw)/2,y=pt+iH-bh;return <g key={d.name}>
        <rect x={x} y={y} width={bw} height={bh} fill={d.fill} rx="2" style={{filter:`drop-shadow(0 0 4px ${d.fill}66)`}}/>
        <text x={x+bw/2} y={pt+iH+16} textAnchor="middle" fill="#3a5570" fontSize="9" fontFamily="IBM Plex Mono">{d.name}</text>
        {d.value>0&&<text x={x+bw/2} y={y-5} textAnchor="middle" fill={d.fill} fontSize="9" fontFamily="IBM Plex Mono">{d.value}</text>}
      </g>;})}
      <line x1={pl} y1={pt+iH} x2={pl+iW} y2={pt+iH} stroke="#1a304a" strokeWidth="1"/>
    </svg>
  );
}

function DonutChart({ data }) {
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total) return <div className="center" style={{padding:40,fontSize:11}}>NO DATA</div>;
  const cx=80,cy=80,r=60,ir=38; let a=-Math.PI/2;
  const slices=data.filter(d=>d.value>0).map(d=>{
    const sw=(d.value/total)*2*Math.PI,x1=cx+r*Math.cos(a),y1=cy+r*Math.sin(a);
    a+=sw;
    const x2=cx+r*Math.cos(a),y2=cy+r*Math.sin(a),lg=sw>Math.PI?1:0;
    const ix1=cx+ir*Math.cos(a-sw),iy1=cy+ir*Math.sin(a-sw),ix2=cx+ir*Math.cos(a),iy2=cy+ir*Math.sin(a);
    return {path:`M${x1} ${y1}A${r} ${r} 0 ${lg} 1 ${x2} ${y2}L${ix2} ${iy2}A${ir} ${ir} 0 ${lg} 0 ${ix1} ${iy1}Z`,
      fill:d.fill,name:d.name,pct:Math.round(d.value/total*100)};
  });
  return (
    <div style={{display:"flex",alignItems:"center",gap:24}}>
      <svg width="160" height="160" viewBox="0 0 160 160" style={{flexShrink:0}}>
        {slices.map((s,i)=><path key={i} d={s.path} fill={s.fill} style={{filter:`drop-shadow(0 0 3px ${s.fill}55)`}}/>)}
        <circle cx={cx} cy={cy} r={ir} fill="#080f1a"/>
        <text x={cx} y={cy+5} textAnchor="middle" fill="#a8c4d8" fontSize="13" fontFamily="IBM Plex Mono" fontWeight="600">{total}</text>
      </svg>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {slices.map((s,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:s.fill,flexShrink:0,boxShadow:`0 0 4px ${s.fill}`}}/>
            <span style={{fontFamily:"IBM Plex Mono",fontSize:11,color:"#a8c4d8"}}>{s.name}</span>
            <span style={{fontFamily:"IBM Plex Mono",fontSize:11,color:"#3a5570",marginLeft:4}}>{s.pct}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function Ring({ score }) {
  const r=50,circ=2*Math.PI*r,color=score>=80?"#0af0b0":score>=50?"#ffcc44":"#ff2952";
  return (
    <div className="score-ring">
      <svg width="110" height="110" viewBox="0 0 110 110">
        <circle cx="55" cy="55" r={r} fill="none" stroke="#112030" strokeWidth="6"/>
        <circle cx="55" cy="55" r={r} fill="none" stroke={color} strokeWidth="6"
          strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={circ*(1-score/100)}
          style={{filter:`drop-shadow(0 0 5px ${color})`,transition:"stroke-dashoffset 1s ease"}}/>
      </svg>
      <div className="score-center">
        <span className={`score-num ${scoreClass(score)}`}>{score}</span>
        <span className="score-of">/100</span>
      </div>
    </div>
  );
}

/* ── TOAST ── */
function Toasts({ toasts }) {
  return (
    <div className="toast-wrap">
      {toasts.map(t=>(
        <div key={t.id} className={`toast ${t.type}`}>
          <span>{t.type==="success"?"✓":t.type==="error"?"✕":"ℹ"}</span>
          {t.msg}
        </div>
      ))}
    </div>
  );
}

/* ── MOCK DATA ── */
const MOCK_SUM={posture_score:61,total_findings:9,
  severity_counts:{CRITICAL:1,HIGH:5,MEDIUM:2,LOW:1},
  service_counts:{IAM:3,S3:3,SG:2,CT:1},status_counts:{OPEN:9,RESOLVED:0}};
const MOCK_FINDS=[
  {finding_id:"a1",rule_id:"CT_DISABLED",severity:"CRITICAL",resource_id:"account",status:"OPEN",service:"CT",
   can_remediate:true,can_rollback:false,remediation_description:"Create CloudTrail with dedicated S3 bucket and start logging",
   first_seen:"2026-02-21T06:00:00Z",last_seen:"2026-02-22T08:00:00Z"},
  {finding_id:"a2",rule_id:"SG_OPEN_ALL",severity:"HIGH",resource_id:"sg-0abc1234",status:"OPEN",service:"SG",
   can_remediate:true,can_rollback:false,remediation_description:"Revoke all inbound rules from 0.0.0.0/0",
   first_seen:"2026-02-21T06:00:00Z",last_seen:"2026-02-22T08:00:00Z"},
  {finding_id:"a3",rule_id:"SG_OPEN_SSH",severity:"HIGH",resource_id:"sg-0abc1234",status:"OPEN",service:"SG",
   can_remediate:true,can_rollback:false,remediation_description:"Revoke SSH (port 22) inbound rule from 0.0.0.0/0",
   first_seen:"2026-02-21T06:00:00Z",last_seen:"2026-02-22T08:00:00Z"},
  {finding_id:"a4",rule_id:"S3_PUBLIC_ACL",severity:"HIGH",resource_id:"my-bucket",status:"OPEN",service:"S3",
   can_remediate:true,can_rollback:false,remediation_description:"Set bucket ACL to private",
   first_seen:"2026-02-21T06:00:00Z",last_seen:"2026-02-22T08:00:00Z"},
  {finding_id:"a5",rule_id:"S3_BLOCK_PUBLIC_DISABLED",severity:"HIGH",resource_id:"my-bucket",status:"OPEN",service:"S3",
   can_remediate:true,can_rollback:false,remediation_description:"Enable all block public access settings",
   first_seen:"2026-02-21T06:00:00Z",last_seen:"2026-02-22T08:00:00Z"},
  {finding_id:"a6",rule_id:"IAM_ADMIN",severity:"HIGH",resource_id:"admin-user",status:"OPEN",service:"IAM",
   can_remediate:true,can_rollback:false,remediation_description:"Detach AdministratorAccess policy",
   first_seen:"2026-02-21T06:00:00Z",last_seen:"2026-02-22T08:00:00Z"},
  {finding_id:"a7",rule_id:"IAM_NO_MFA",severity:"MEDIUM",resource_id:"dev-user",status:"OPEN",service:"IAM",
   can_remediate:true,can_rollback:false,remediation_description:"Attach deny-all policy until MFA is configured",
   first_seen:"2026-02-21T06:00:00Z",last_seen:"2026-02-22T08:00:00Z"},
  {finding_id:"a8",rule_id:"S3_NO_ENCRYPTION",severity:"MEDIUM",resource_id:"logs-bucket",status:"OPEN",service:"S3",
   can_remediate:true,can_rollback:false,remediation_description:"Enable AES256 server-side encryption",
   first_seen:"2026-02-21T06:00:00Z",last_seen:"2026-02-22T08:00:00Z"},
  {finding_id:"a9",rule_id:"S3_NO_VERSIONING",severity:"LOW",resource_id:"logs-bucket",status:"OPEN",service:"S3",
   can_remediate:true,can_rollback:false,remediation_description:"Enable bucket versioning",
   first_seen:"2026-02-21T06:00:00Z",last_seen:"2026-02-22T08:00:00Z"},
];

/* ── LOGIN ── */
function Login({ onLogin }) {
  const [email,setEmail]=useState(""), [pass,setPass]=useState("");
  const [newPass,setNewPass]=useState(""), [confirm,setConfirm]=useState("");
  const [phase,setPhase]=useState("login"), [session,setSession]=useState(null);
  const [err,setErr]=useState(""), [busy,setBusy]=useState(false);
  const submit=async()=>{
    setErr(""); setBusy(true);
    try {
      if(IS_DEMO){if(!email||!pass){setErr("Enter any email + password.");setBusy(false);return;}onLogin({email,token:"demo"});return;}
      if(phase==="login"){
        const d=await cognitoLogin(email,pass);
        if(d.ChallengeName==="NEW_PASSWORD_REQUIRED"){setSession(d.Session);setPhase("newpass");}
        else if(d.AuthenticationResult){localStorage.setItem("cspm_tok",d.AuthenticationResult.IdToken);onLogin({email,token:d.AuthenticationResult.IdToken});}
      } else {
        if(newPass!==confirm){setErr("Passwords don't match.");setBusy(false);return;}
        const d=await cognitoSetPwd(email,newPass,session);
        if(d.AuthenticationResult){localStorage.setItem("cspm_tok",d.AuthenticationResult.IdToken);onLogin({email,token:d.AuthenticationResult.IdToken});}
      }
    } catch(e){setErr(e.message||e.__type||"Authentication failed.");}
    setBusy(false);
  };
  const onKey=e=>e.key==="Enter"&&submit();
  return (
    <div className="login-wrap">
      <div className="login-glow"/>
      <div className="login-box">
        <div className="login-eyebrow">CSPM // Security Console</div>
        <div className="login-title">{phase==="login"?"Sign in":"Set new password"}</div>
        <div className="login-sub">{IS_DEMO?"DEMO MODE":`${CONFIG.POOL_ID} · ${CONFIG.REGION.toUpperCase()}`}</div>
        {err&&<div className="alert alert-err">⚠ {err}</div>}
        {phase==="newpass"&&<div className="alert alert-info">First sign-in — set a permanent password.</div>}
        {phase==="login"?<>
          <label className="form-label">Email</label>
          <input className="form-input" type="email" value={email} autoFocus onChange={e=>setEmail(e.target.value)} onKeyDown={onKey} placeholder="admin@example.com"/>
          <label className="form-label">Password</label>
          <input className="form-input" type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={onKey} placeholder="••••••••••"/>
        </>:<>
          <label className="form-label">New Password</label>
          <input className="form-input" type="password" value={newPass} autoFocus onChange={e=>setNewPass(e.target.value)} onKeyDown={onKey} placeholder="Min 8 chars, upper+lower+number"/>
          <label className="form-label">Confirm Password</label>
          <input className="form-input" type="password" value={confirm} onChange={e=>setConfirm(e.target.value)} onKeyDown={onKey} placeholder="Repeat password"/>
        </>}
        <button className="btn-primary" onClick={submit} disabled={busy}>{busy?"AUTHENTICATING...":phase==="login"?"SIGN IN →":"SET PASSWORD →"}</button>
      </div>
    </div>
  );
}

/* ── CONFIRM MODAL ── */
function ConfirmModal({ finding, mode, onConfirm, onCancel, busy }) {
  if(!finding) return null;
  const isRemediate = mode==="remediate";
  const isRollback  = mode==="rollback";
  const isCritical  = finding.severity==="CRITICAL" && isRemediate;
  return (
    <div className="overlay" onClick={onCancel}>
      <div className="modal" style={{maxWidth:520}} onClick={e=>e.stopPropagation()}>
        <div className="modal::before"/>
        <div className="modal-head">
          <div>
            <div className="modal-rule">{isRemediate?"Confirm Remediation":"Confirm Rollback"}</div>
            <span className={`sev ${finding.severity}`}>{finding.severity}</span>
          </div>
          <button className="modal-x" onClick={onCancel}>✕</button>
        </div>

        {isCritical && (
          <div className="alert-warn" style={{padding:"10px 14px",borderRadius:2,fontFamily:"IBM Plex Mono",fontSize:10,
            background:"rgba(255,119,48,.06)",border:"1px solid rgba(255,119,48,.2)",color:"#ff7730",marginBottom:16,lineHeight:1.5}}>
            ⚠ CRITICAL severity — an approval email will be sent to your SNS address.<br/>
            The fix will only run after you click Approve in that email.
          </div>
        )}

        {isRollback && (
          <div style={{padding:"10px 14px",borderRadius:2,fontFamily:"IBM Plex Mono",fontSize:10,
            background:"rgba(123,97,255,.06)",border:"1px solid rgba(123,97,255,.2)",color:"#7b61ff",marginBottom:16,lineHeight:1.5}}>
            ↩ This will restore the previous AWS configuration for this resource.<br/>
            The finding will be marked OPEN again.
          </div>
        )}

        {[
          ["Rule",     finding.rule_id],
          ["Resource", finding.resource_id],
          ["Service",  finding.service],
        ].map(([k,v])=>(
          <div key={k} className="modal-row">
            <span className="modal-k">{k}</span>
            <span className="modal-v">{v}</span>
          </div>
        ))}

        {isRemediate && (
          <>
            <div style={{marginTop:14,marginBottom:4,fontFamily:"IBM Plex Mono",fontSize:9,letterSpacing:".2em",textTransform:"uppercase",color:"var(--muted)"}}>Action that will be taken</div>
            <div className="action-box">
              {finding.remediation_description || "Remediate misconfiguration"}
            </div>
          </>
        )}

        {isRollback && finding.remediation_action && (
          <>
            <div style={{marginTop:14,marginBottom:4,fontFamily:"IBM Plex Mono",fontSize:9,letterSpacing:".2em",textTransform:"uppercase",color:"var(--muted)"}}>Previous remediation that will be reversed</div>
            <div className="action-box">{finding.remediation_action}</div>
          </>
        )}

        <div className="modal-actions">
          <button className="btn-confirm cancel" onClick={onCancel} disabled={busy}>Cancel</button>
          <button
            className={`btn-confirm go ${isRollback?"purple":isCritical?"danger":""}`}
            onClick={onConfirm} disabled={busy}>
            {busy ? <><span className="spinner-sm" style={{marginRight:8}}/>RUNNING...</>
              : isRemediate ? (isCritical ? "SEND APPROVAL EMAIL" : "REMEDIATE NOW")
              : "ROLLBACK NOW"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── DETAIL MODAL ── */
function DetailModal({ finding, onClose, onRemediate, onRollback, onExclude, onUnexclude, exclusions }) {
  const isExcluded = exclusions.includes(finding.resource_id);
  if(!finding) return null;
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <div>
            <div className="modal-rule">{finding.rule_id}</div>
            <span className={`sev ${finding.severity}`}>{finding.severity}</span>
          </div>
          <button className="modal-x" onClick={onClose}>✕</button>
        </div>
        {[["Finding ID",finding.finding_id],["Resource",finding.resource_id],["Service",finding.service],
          ["Status",finding.status],
          ...(finding.status==="OPEN"&&finding.days_open!=null?[["Open For", finding.days_open===0?"today":finding.days_open===1?"1 day":`${finding.days_open} days`]]:[]),
          ["First Seen",fmt(finding.first_seen)],["Last Seen",fmt(finding.last_seen)],
          ...(finding.remediated_at?[["Remediated",fmt(finding.remediated_at)]]:[] ),
          ...(finding.remediation_action?[["Action Taken",finding.remediation_action]]:[]),
        ].map(([k,v])=>(
          <div key={k} className="modal-row"><span className="modal-k">{k}</span><span className="modal-v">{v}</span></div>
        ))}
        {finding.remediation_description&&finding.status==="OPEN"&&(
          <>
            <div style={{marginTop:14,marginBottom:4,fontFamily:"IBM Plex Mono",fontSize:9,letterSpacing:".2em",textTransform:"uppercase",color:"var(--muted)"}}>Available Remediation</div>
            <div className="action-box">{finding.remediation_description}</div>
          </>
        )}
        <div className="modal-actions">
          <button className="btn-confirm cancel" onClick={onClose}>Close</button>
          {!isExcluded&&(
            <button className="btn-confirm cancel" style={{color:"var(--medium)",borderColor:"rgba(255,204,68,.3)"}}
              onClick={()=>{onExclude(finding.resource_id);onClose();}}>
              EXCLUDE RESOURCE
            </button>
          )}
          {isExcluded&&(
            <button className="btn-confirm cancel" style={{color:"var(--muted)",borderColor:"var(--border2)"}}
              onClick={()=>{onUnexclude(finding.resource_id);onClose();}}>
              REMOVE EXCLUSION
            </button>
          )}
          {finding.status==="OPEN"&&finding.can_remediate&&(
            <button className="btn-confirm go" onClick={()=>{onClose();onRemediate(finding);}}>REMEDIATE</button>
          )}
          {finding.can_rollback&&(
            <button className="btn-confirm go purple" onClick={()=>{onClose();onRollback(finding);}}>ROLLBACK</button>
          )}
        </div>
      </div>
    </div>
  );
}


/* ── TREND CHART ── */
function TrendChart({ data }) {
  const [mode, setMode] = useState("score"); // "score" | "severity"

  if (!data || data.length === 0) {
    return <div className="trend-no-data">No trend data yet — run a scan to start tracking.</div>;
  }

  const W = 800, H = 200, PAD = { t: 14, r: 20, b: 32, l: 44 };
  const iW = W - PAD.l - PAD.r;
  const iH = H - PAD.t - PAD.b;

  const xPos = i => PAD.l + (i / Math.max(data.length - 1, 1)) * iW;

  // ── Score + total view ────────────────────────────────────────────────────
  const ScoreView = () => {
    const scores = data.map(d => d.posture_score);
    const totals = data.map(d => d.total_findings);
    const maxTotal = Math.max(...totals, 1);
    const yScore = v => PAD.t + iH - (v / 100) * iH;
    const yTotal = v => PAD.t + iH - (v / maxTotal) * iH;
    const scorePath = scores.map((v,i) => `${i===0?"M":"L"}${xPos(i)},${yScore(v)}`).join(" ");
    const totalPath = totals.map((v,i) => `${i===0?"M":"L"}${xPos(i)},${yTotal(v)}`).join(" ");
    const gridY = [0,25,50,75,100].map(v=>({v,y:yScore(v)}));
    return (<>
      {gridY.map(({v,y})=>(
        <g key={v}>
          <line x1={PAD.l} y1={y} x2={W-PAD.r} y2={y} stroke="rgba(255,255,255,0.04)" strokeWidth="1"/>
          <text x={PAD.l-6} y={y+4} fill="var(--muted)" fontSize="11" textAnchor="end" fontFamily="IBM Plex Mono">{v}</text>
        </g>
      ))}
      <path d={totalPath} fill="none" stroke="#ff6b35" strokeWidth="1.5" strokeDasharray="4 2" opacity="0.6"/>
      <path d={scorePath} fill="none" stroke="#0af0b0" strokeWidth="2"/>
      {scores.map((v,i)=>(
        <circle key={i} cx={xPos(i)} cy={yScore(v)} r="3" fill="#0af0b0" stroke="#04080f" strokeWidth="1.5">
          <title>{data[i].date}: score {v}/100</title>
        </circle>
      ))}
    </>);
  };

  // ── Severity breakdown view ───────────────────────────────────────────────
  const SeverityView = () => {
    const series = [
      { key:"critical", color:"#ff2952", label:"Critical" },
      { key:"high",     color:"#ff7730", label:"High"     },
      { key:"medium",   color:"#ffcc44", label:"Medium"   },
      { key:"low",      color:"#0af0b0", label:"Low"      },
    ];
    const maxVal = Math.max(...data.flatMap(d => series.map(s => d[s.key] || 0)), 1);
    const yVal = v => PAD.t + iH - (v / maxVal) * iH;
    const gridCount = 4;
    const gridVals = Array.from({length: gridCount+1}, (_,i) => Math.round((maxVal/gridCount)*i));
    return (<>
      {gridVals.map(v=>{const y=yVal(v);return(
        <g key={v}>
          <line x1={PAD.l} y1={y} x2={W-PAD.r} y2={y} stroke="rgba(255,255,255,0.04)" strokeWidth="1"/>
          <text x={PAD.l-6} y={y+4} fill="var(--muted)" fontSize="11" textAnchor="end" fontFamily="IBM Plex Mono">{v}</text>
        </g>
      );})}
      {series.map(s=>{
        const path = data.map((d,i)=>`${i===0?"M":"L"}${xPos(i)},${yVal(d[s.key]||0)}`).join(" ");
        return <path key={s.key} d={path} fill="none" stroke={s.color} strokeWidth="1.8" opacity="0.85"/>;
      })}
      {series.map(s=>data.map((d,i)=>(
        <circle key={`${s.key}-${i}`} cx={xPos(i)} cy={yVal(d[s.key]||0)} r="2.5"
          fill={s.color} stroke="#04080f" strokeWidth="1">
          <title>{d.date}: {s.label} = {d[s.key]||0}</title>
        </circle>
      )))}
    </>);
  };

  // Shared x-axis labels
  const xLabels = data.filter((_,i) => data.length<=10 || i%Math.ceil(data.length/8)===0);

  const scoreLegend = [
    {color:"#0af0b0", label:"Posture Score (0–100)"},
    {color:"#ff6b35", label:"Total Findings", dashed:true},
  ];
  const sevLegend = [
    {color:"#ff2952",label:"Critical"},{color:"#ff7730",label:"High"},
    {color:"#ffcc44",label:"Medium"},{color:"#0af0b0",label:"Low"},
  ];
  const legend = mode==="score" ? scoreLegend : sevLegend;

  return (
    <div className="trend-svg-wrap">
      {/* Toggle */}
      <div style={{display:"flex",justifyContent:"flex-end",marginBottom:8,gap:6}}>
        <button onClick={()=>setMode("score")}
          style={{padding:"3px 12px",borderRadius:2,fontFamily:"IBM Plex Mono",fontSize:9,letterSpacing:".1em",
            cursor:"pointer",border:"1px solid",transition:"all .15s",
            background:mode==="score"?"rgba(10,240,176,.1)":"transparent",
            borderColor:mode==="score"?"var(--accent)":"var(--border2)",
            color:mode==="score"?"var(--accent)":"var(--muted)"}}>
          SCORE
        </button>
        <button onClick={()=>setMode("severity")}
          style={{padding:"3px 12px",borderRadius:2,fontFamily:"IBM Plex Mono",fontSize:9,letterSpacing:".1em",
            cursor:"pointer",border:"1px solid",transition:"all .15s",
            background:mode==="severity"?"rgba(255,41,82,.08)":"transparent",
            borderColor:mode==="severity"?"var(--critical)":"var(--border2)",
            color:mode==="severity"?"var(--critical)":"var(--muted)"}}>
          SEVERITY
        </button>
      </div>

      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto"}}>
        {mode==="score" ? <ScoreView/> : <SeverityView/>}
        {/* Shared X axis labels */}
        {xLabels.map(d=>{
          const i=data.indexOf(d);
          return(
            <text key={i} x={xPos(i)} y={H-6} fill="var(--muted)"
              fontSize="10" textAnchor="middle" fontFamily="IBM Plex Mono">
              {d.date.slice(5)}
            </text>
          );
        })}
      </svg>

      <div className="trend-legend">
        {legend.map(l=>(
          <div key={l.label} className="trend-legend-item">
            <div className="trend-legend-dot" style={{
              background: l.dashed ? "transparent" : l.color,
              border: l.dashed ? `2px dashed ${l.color}` : "none"
            }}/>
            {l.label}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── DASHBOARD ── */
function Dashboard({ user, onLogout }) {
  const [sum,setSum]=useState(null), [finds,setFinds]=useState([]);
  const [loading,setLoading]=useState(true), [lastScan,setLastScan]=useState(null);
  const [tab,setTab]=useState("open");
  const [sel,setSel]=useState(null);
  const [confirm,setConfirm]=useState(null); // {finding, mode}
  const [actionBusy,setActionBusy]=useState(false);
  const [pendingIds,setPendingIds]=useState(new Set());
  const [sevF,setSevF]=useState("ALL"), [svcF,setSvcF]=useState("ALL");
  const [toasts,setToasts]=useState([]);
  const toastId=useRef(0);
  const [trends,setTrends]=useState([]);
  const [light,setLight]=useState(()=>localStorage.getItem("cspm_theme")==="light");

  useEffect(()=>{
    document.body.classList.toggle("light", light);
    localStorage.setItem("cspm_theme", light?"light":"dark");
  },[light]);
  const [showSettings,setShowSettings]=useState(false);
  const [showAudit,setShowAudit]=useState(false);
  const [auditLogs,setAuditLogs]=useState([]);
  const [auditLoading,setAuditLoading]=useState(false);
  const [autoRemediate,setAutoRemediate]=useState(false);
  const [exclusions,setExclusions]=useState([]);
  const [newExclusion,setNewExclusion]=useState("");
  const [configBusy,setConfigBusy]=useState(false);
  const [scanBusy,setScanBusy]=useState(false);

  const addToast=(msg,type="success")=>{
    const id=++toastId.current;
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),4000);
  };

  const load=useCallback(async()=>{
    setLoading(true);
    if(IS_DEMO){
      await new Promise(r=>setTimeout(r,600));
      setSum(MOCK_SUM); setFinds(MOCK_FINDS); setLastScan(new Date().toISOString());
      setLoading(false); return;
    }
    try {
      const h={Authorization:user.token};
      const [s,f]=await Promise.all([
        fetch(`${CONFIG.API_URL}/summary`,{headers:h}).then(r=>r.json()),
        fetch(`${CONFIG.API_URL}/findings`,{headers:h}).then(r=>r.json()),
      ]);
      setSum(s); setFinds(f.findings||[]); setLastScan(new Date().toISOString());
    } catch(e){console.error(e);addToast("Failed to load data","error");}
    setLoading(false);
  },[user.token]);

  useEffect(()=>{load();},[load]);

  useEffect(()=>{
    if(IS_DEMO){
      // Mock trend data for demo
      const base = Date.now() - 7*86400000;
      setTrends(Array.from({length:8},(_,i)=>({
        date: new Date(base+i*86400000).toISOString().slice(0,10),
        posture_score: Math.min(100, 45 + i*4 + Math.floor(Math.random()*5)),
        total_findings: Math.max(5, 14 - i + Math.floor(Math.random()*3)),
        critical: Math.max(0, 2 - Math.floor(i/3)),
        high:     Math.max(0, 5 - Math.floor(i/2)),
        medium:   Math.max(0, 4 - Math.floor(i/4)),
        low:      Math.max(0, 3 - Math.floor(i/5)),
      })));
      return;
    }
    fetch(`${CONFIG.API_URL}/trends`,{headers:{Authorization:user.token}})
      .then(r=>r.json())
      .then(d=>setTrends(d.trends||[]))
      .catch(console.error);
  },[user.token]);

  useEffect(()=>{
    if(IS_DEMO) return;
    fetch(`${CONFIG.API_URL}/config`,{headers:{Authorization:user.token}})
      .then(r=>r.json())
      .then(d=>{setAutoRemediate(d.auto_remediate);setExclusions(d.exclusions||[]);})
      .catch(console.error);
  },[user.token]);

  const saveConfig=async(newAR,newEx)=>{
    if(IS_DEMO){addToast("Demo mode — config not saved","info");return;}
    setConfigBusy(true);
    try{
      await fetch(`${CONFIG.API_URL}/config`,{method:"POST",
        headers:{Authorization:user.token,"Content-Type":"application/json"},
        body:JSON.stringify({auto_remediate:newAR,exclusions:newEx})});
      addToast("Config saved","success");
    }catch(e){addToast("Failed to save config","error");}
    setConfigBusy(false);
  };

  const loadAudit=async()=>{
    if(IS_DEMO){setAuditLogs([
      {audit_id:"1",timestamp:"2026-02-24T14:00:00Z",action:"REMEDIATED",rule_id:"IAM_ADMIN",resource_id:"Jeyanth",actor:"arjuna12005@email.com",status:"SUCCESS",detail:"Detached AdministratorAccess"},
      {audit_id:"2",timestamp:"2026-02-24T13:00:00Z",action:"CONFIG_CHANGED",rule_id:"N/A",resource_id:"AUTO_REMEDIATE",actor:"dashboard-user",status:"SUCCESS",detail:"old: false, new: true"},
    ]);return;}
    setAuditLoading(true);
    try{
      const r=await fetch(`${CONFIG.API_URL}/audit`,{headers:{Authorization:user.token}});
      const d=await r.json();
      setAuditLogs(d.logs||[]);
    }catch(e){console.error(e);}
    setAuditLoading(false);
  };

  const toggleAutoRemediate=async()=>{const next=!autoRemediate;setAutoRemediate(next);await saveConfig(next,exclusions);};

  const addExclusion=async()=>{
    if(!newExclusion.trim()) return;
    const next=[...new Set([...exclusions,newExclusion.trim()])];
    setExclusions(next);setNewExclusion("");
    await saveConfig(autoRemediate,next);
  };

  const removeExclusion=async(resource)=>{
    const next=exclusions.filter(e=>e!==resource);
    setExclusions(next);
    await saveConfig(autoRemediate,next);
  };

  const apiCall=async(endpoint,body)=>{
    if(IS_DEMO) return {message:"Demo mode — no real AWS calls made."};
    const r=await fetch(`${CONFIG.API_URL}/${endpoint}`,{
      method:"POST",headers:{Authorization:user.token,"Content-Type":"application/json"},
      body:JSON.stringify(body)
    });
    return r.json();
  };

  const handleRemediate=async()=>{
    const f=confirm.finding; setActionBusy(true);
    try {
      const res=await apiCall("remediate",{finding_id:f.finding_id});
      setPendingIds(s=>new Set([...s,f.finding_id]));
      if(f.severity==="CRITICAL"){
        addToast("Approval email sent — check your inbox","info");
      } else {
        addToast(`Remediation started for ${f.rule_id}`,"success");
      }
      setConfirm(null);
      setTimeout(()=>{ load(); setPendingIds(s=>{const n=new Set(s);n.delete(f.finding_id);return n;}); },3000);
    } catch(e){ addToast("Remediation failed: "+e.message,"error"); }
    setActionBusy(false);
  };

  const handleRollback=async()=>{
    const f=confirm.finding; setActionBusy(true);
    try {
      await apiCall("rollback",{finding_id:f.finding_id});
      addToast(`Rolled back ${f.rule_id} on ${f.resource_id}`,"success");
      setConfirm(null);
      setTimeout(load,2000);
    } catch(e){ addToast("Rollback failed: "+e.message,"error"); }
    setActionBusy(false);
  };


  const handleScan=async()=>{
    if(IS_DEMO){addToast("Demo mode — scan not triggered","info");return;}
    setScanBusy(true);
    try{
      const res=await fetch(`${CONFIG.API_URL}/scan`,{
        method:"POST",
        headers:{"Authorization":user.token,"Content-Type":"application/json"},
        body:"{}"
      });
      if(!res.ok){
        const err=await res.json().catch(()=>({error:`HTTP ${res.status}`}));
        throw new Error(err.error||`HTTP ${res.status}`);
      }
      addToast("Scan triggered — refresh in ~30s","success");
      setTimeout(()=>{load();setScanBusy(false);},32000);
    }catch(e){
      console.error("Scan failed:",e);
      addToast("Scan trigger failed: "+e.message,"error");
      setScanBusy(false);
    }
  };

  const openFinds    = finds.filter(f=>f.status==="OPEN");
  const resolvedFinds= finds.filter(f=>f.status==="RESOLVED");

  const filtered=(tab==="open"?openFinds:resolvedFinds).filter(f=>
    (sevF==="ALL"||f.severity===sevF)&&(svcF==="ALL"||f.service===svcF)
  );

  const score=sum?.posture_score??0;
  const sevData=SEV_ORDER.map(s=>({name:s,value:sum?.severity_counts?.[s]??0,fill:SEV_COLORS[s]}));
  const svcData=Object.entries(sum?.service_counts??{}).map(([n,v])=>({name:n,value:v,fill:SVC_COLORS[n]||"#00aaff"}));
  const tog=(_,set,v)=>set(c=>c===v?"ALL":v);

  return (<>

      <div style={{display:"flex",alignItems:"center"}}>
        <div className="nav-brand"><div className="live-dot"/>CSPM</div>
        {lastScan&&<div className="nav-info">REFRESHED {new Date(lastScan).toLocaleTimeString()}{IS_DEMO?" · DEMO":""}</div>}
      </div>
      <div className="nav-right">
        <div className="nav-user">{user.email}</div>
        <button className="theme-btn" onClick={()=>setLight(l=>!l)}>{light?"☀":"🌙"}</button>
        <button className="btn-sm" onClick={()=>setShowSettings(s=>!s)}>⚙ SETTINGS</button>
        <button className="btn-sm" onClick={()=>{setShowAudit(s=>!s);if(!showAudit)loadAudit();}}>📋 AUDIT</button>
        <button className="btn-scan" onClick={handleScan} disabled={scanBusy}>
          {scanBusy?<><span className="spinner-sm" style={{marginRight:6}}/>SCANNING...</>:"⟳ SCAN NOW"}
        </button>
        <button className="btn-sm" onClick={load}>⟳ REFRESH</button>
        <button className="btn-sm" onClick={onLogout}>SIGN OUT</button>
      </div>
    </nav>

    <main>
      {/* BANNER */}
      <div className="banner fade-in">
        <div className="score-card"><Ring score={score}/><div className="score-title">Security Posture Score</div></div>
        <div className="stat-grid">
          {[
            {l:"Critical", v:sum?.severity_counts?.CRITICAL??0, c:"c"},
            {l:"High",     v:sum?.severity_counts?.HIGH??0,     c:"h"},
            {l:"Medium",   v:sum?.severity_counts?.MEDIUM??0,   c:"m"},
            {l:"Resolved", v:sum?.status_counts?.RESOLVED??0,   c:"r"},
          ].map(({l,v,c})=>(
            <div key={c} className={`stat-card ${c} fade-in`}>
              <div className="stat-label">{l}</div>
              <div className="stat-val">{v}</div>
              <div className="stat-tag">{c==="r"?"FIXED":"OPEN"}</div>
            </div>
          ))}
        </div>
      </div>

      {/* TREND CHART */}
      <div className="trend-wrap fade-in">
        <div className="trend-title"><span style={{display:"flex",alignItems:"center",gap:8}}><span/>Security Posture Over Time</span>
          <span style={{fontSize:9,color:"var(--muted)"}}>{trends.length} data point{trends.length!==1?"s":""}</span>
        </div>
        <TrendChart data={trends}/>
      </div>

      {/* CHARTS */}
      <div className="charts-row fade-in">
        <div className="card"><div className="card-title">Findings by Severity</div><BarChart data={sevData}/></div>
        <div className="card"><div className="card-title">Exposure by Service</div><DonutChart data={svcData}/></div>
      </div>


      {/* SETTINGS PANEL */}
      {showSettings && (
        <div className="settings-panel fade-in">
          <div className="settings-title">Configuration</div>

          {/* AUTO-REMEDIATE TOGGLE */}
          <div className="setting-row">
            <div className="setting-info">
              <div className="setting-label">Auto-Remediate</div>
              <div className="setting-desc">
                When ON, new findings are automatically fixed on the next scan without requiring manual approval.
              </div>

                <div className="setting-warn">
                  ⚠ Enabled — new findings will be auto-remediated. Disable during deployments.
                </div>
              )}
            </div>
            <div className="toggle-wrap">
              <span className={`toggle-label ${autoRemediate ? "on" : "off"}`}>

                <input type="checkbox" checked={autoRemediate} onChange={toggleAutoRemediate} disabled={configBusy}/>

            ))}
          </div>
        </div>

        <div className="tbl-wrap">
          {loading
            ?<div className="center"><div className="spinner"/>LOADING...</div>
            :filtered.length===0
            ?<div className="center">NO FINDINGS</div>
            :<table>
              <thead><tr>
                <th>Severity</th><th>Rule</th><th>Resource</th><th>Service</th>
                <th>Status</th><th>Age</th><th>First Seen</th><th>Last Seen</th><th>Excluded</th><th>Action</th>
              </tr></thead>
              <tbody>
                {filtered.map(f=>{
                  const isPending=pendingIds.has(f.finding_id);
                  return (
                    <tr key={f.finding_id} onClick={()=>setSel(f)} style={{cursor:"pointer"}}>
                      <td><span className={`sev ${f.severity}`}>{f.severity}</span></td>
                      <td className="mono">{f.rule_id}</td>
                      <td className="mono" style={{color:"#e0eef8"}}>{f.resource_id}</td>
                      <td className="mono dim">{f.service}</td>
                      <td>
                        {f.status==="OPEN"
                          ?<span className="st-open">OPEN</span>
                          :<span className="st-resolved">RESOLVED</span>}
                      </td>
                      <td>{(()=>{
                        const d=f.days_open||0;
                        const cls=d===0?"fresh":d<3?"fresh":d<7?"warn":d<14?"old":"critical";
                        const label=d===0?"today":d===1?"1d":`${d}d`;
                        return f.status==="OPEN"
                          ?<span className={`age-badge ${cls}`}>{label}</span>
                          :<span className="mono dim" style={{fontSize:9}}>—</span>;
                      })()}</td>
                      <td className="mono dim" style={{fontSize:10}}>{fmt(f.first_seen)}</td>
                      <td className="mono dim" style={{fontSize:10}}>{fmt(f.last_seen)}</td>
                      <td className="mono dim" style={{fontSize:9}}>{exclusions.includes(f.resource_id)?<span style={{color:"var(--medium)",fontFamily:"IBM Plex Mono",fontSize:9}}>EXCLUDED</span>:""}</td>
                      <td onClick={e=>e.stopPropagation()}>
                        {isPending
                          ?<button className="btn-action btn-pending" disabled>
                              <span className="spinner-sm" style={{marginRight:6}}/>PENDING
                            </button>
                          :f.status==="OPEN"&&f.can_remediate
                          ?<button className="btn-action btn-remediate"
                              onClick={e=>{e.stopPropagation();setConfirm({finding:f,mode:"remediate"});}}>
                              REMEDIATE
                            </button>
                          :f.can_rollback
                          ?<button className="btn-action btn-rollback"
                              onClick={e=>{e.stopPropagation();setConfirm({finding:f,mode:"rollback"});}}>
                              ROLLBACK
                            </button>
                          :<span className="mono dim" style={{fontSize:9}}>—</span>
                        }
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          }
        </div>
      </div>
    </main>

    {/* AUDIT LOG PANEL */}
    {showAudit&&(
      <div className="audit-wrap fade-in">
        <div className="audit-header">
          <div className="audit-title">Audit Log</div>
          <button className="btn-sm" onClick={loadAudit}>⟳ REFRESH</button>
        </div>
        {auditLoading
          ?<div className="center"><div className="spinner"/>LOADING...</div>
          :auditLogs.length===0
          ?<div className="center">NO AUDIT ENTRIES YET</div>
          :<>
            <div className="audit-row audit-head">
              <span>Timestamp</span><span>Action</span><span>Rule</span>
              <span>Resource / Actor</span><span>Status</span>
            </div>
            {auditLogs.map(log=>(
              <div key={log.audit_id} className="audit-row">
                <span style={{color:"var(--muted)",fontSize:9}}>{new Date(log.timestamp).toLocaleString()}</span>
                <span><span className={`audit-action ${log.status==="FAILED"?"FAILED":log.action}`}>{log.action?.replace("_"," ")}</span></span>
                <span style={{color:"var(--bright)"}}>{log.rule_id}</span>
                <span>
                  <div style={{color:"var(--bright)",marginBottom:2}}>{log.resource_id}</div>
                  <div className="audit-actor">{log.actor}</div>
                </span>
                <span style={{color:log.status==="SUCCESS"?"var(--accent)":"var(--critical)",fontSize:9}}>{log.status}</span>
              </div>
            ))}
          </>
        }
      </div>
    )}

    {/* DETAIL MODAL */}
    {sel&&!confirm&&(
      <DetailModal finding={sel} onClose={()=>setSel(null)}
        onRemediate={f=>setConfirm({finding:f,mode:"remediate"})}
        onRollback={f=>setConfirm({finding:f,mode:"rollback"})}
        exclusions={exclusions}
        onExclude={async r=>{
          const next=[...new Set([...exclusions,r])];
          setExclusions(next);
          await saveConfig(autoRemediate,next);
          addToast(`${r} added to exclusion list`,"info");
        }}
        onUnexclude={async r=>{
          const next=exclusions.filter(e=>e!==r);
          setExclusions(next);
          await saveConfig(autoRemediate,next);
          addToast(`${r} removed from exclusion list`,"info");
        }}/>
    )}

    {/* CONFIRM MODAL */}
    {confirm&&(
      <ConfirmModal finding={confirm.finding} mode={confirm.mode}
        onConfirm={confirm.mode==="remediate"?handleRemediate:handleRollback}
        onCancel={()=>setConfirm(null)} busy={actionBusy}/>
    )}

    <Toasts toasts={toasts}/>
  </>);
}

/* ── ROOT ── */
function App() {
  const [user,setUser]=useState(()=>{
    const tok=localStorage.getItem("cspm_tok"),em=localStorage.getItem("cspm_em");
    return tok&&em?{token:tok,email:em}:null;
  });
  const login=({email,token})=>{localStorage.setItem("cspm_tok",token);localStorage.setItem("cspm_em",email);setUser({email,token});};
  const logout=()=>{localStorage.removeItem("cspm_tok");localStorage.removeItem("cspm_em");setUser(null);};
  return user?<Dashboard user={user} onLogout={logout}/>:<Login onLogin={login}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
