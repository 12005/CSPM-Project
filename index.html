<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CSPM — Cloud Security Posture</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f1f5f9;--surface:#ffffff;--surface2:#f8fafc;
  --border:#e2e8f0;--border2:#cbd5e1;
  --text:#0f172a;--text2:#475569;--muted:#94a3b8;
  --accent:#2563eb;--accent-bg:#eff6ff;
  --critical:#dc2626;--critical-bg:#fef2f2;
  --high:#ea580c;--high-bg:#fff7ed;
  --medium:#ca8a04;--medium-bg:#fefce8;
  --low:#16a34a;--low-bg:#f0fdf4;
  --resolved:#7c3aed;--resolved-bg:#f5f3ff;
  --sans:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:8px;--r-sm:5px;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.08),0 1px 4px rgba(0,0,0,.05);
}
body.dark{
  --bg:#0d1117;--surface:#161b27;--surface2:#1c2333;
  --border:#21293d;--border2:#2d3a52;
  --text:#e2e8f0;--text2:#8b9ab0;--muted:#3d4f67;
  --accent:#3b82f6;--accent-bg:rgba(59,130,246,.1);
  --critical:#f87171;--critical-bg:rgba(220,38,38,.12);
  --high:#fb923c;--high-bg:rgba(234,88,12,.12);
  --medium:#fbbf24;--medium-bg:rgba(202,138,4,.12);
  --low:#4ade80;--low-bg:rgba(22,163,74,.12);
  --resolved:#a78bfa;--resolved-bg:rgba(124,58,237,.12);
  --shadow:0 1px 3px rgba(0,0,0,.3);--shadow-md:0 4px 16px rgba(0,0,0,.4);
}
html,body{height:100%;font-family:var(--sans)}
body{background:var(--bg);color:var(--text);transition:background .2s,color .2s}
#root{min-height:100vh;display:flex;flex-direction:column}

/* NAV */
nav{height:56px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.nav-brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:15px;color:var(--text)}
.nav-logo{width:30px;height:30px;background:var(--accent);border-radius:7px;color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.live-pill{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:var(--low);
  background:var(--low-bg);border:1px solid rgba(22,163,74,.2);padding:2px 8px;border-radius:100px}
.live-dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.nav-meta{font-size:12px;color:var(--muted)}
.nav-right{display:flex;align-items:center;gap:6px}
.nbtn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:var(--r-sm);
  border:1px solid var(--border);background:transparent;color:var(--text2);
  font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:var(--sans)}
.nbtn:hover{border-color:var(--border2);background:var(--surface2);color:var(--text)}
.nbtn.accent{background:var(--accent);border-color:var(--accent);color:#fff}
.nbtn.accent:hover{opacity:.9}
.nbtn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.nbtn:disabled{opacity:.5;cursor:not-allowed}
.ndiv{width:1px;height:18px;background:var(--border2);margin:0 2px}
.nav-email{font-size:12px;color:var(--muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* LAYOUT */
.app-body{display:flex;flex:1;min-height:0;overflow:hidden}
main{flex:1;overflow-y:auto;padding:20px 24px}

/* DRAWER */
.drawer{width:360px;min-width:360px;background:var(--surface);border-left:1px solid var(--border);
  overflow-y:auto;padding:20px;flex-shrink:0}
.drawer.closed{display:none}
.drawer-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.drawer-title{font-size:13px;font-weight:600;color:var(--text)}
.section-divider{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;
  color:var(--muted);padding:12px 0 8px;border-bottom:1px solid var(--border);margin-bottom:12px}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:18px;box-shadow:var(--shadow)}

/* BANNER */
.banner{display:grid;grid-template-columns:210px 1fr;gap:14px;margin-bottom:18px}
.score-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:18px 20px;display:flex;align-items:center;gap:16px;box-shadow:var(--shadow)}
.score-ring{position:relative;width:84px;height:84px;flex-shrink:0}
.score-ring svg{transform:rotate(-90deg)}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
.score-num{font-size:24px;font-weight:700;font-family:var(--mono);line-height:1}
.score-num.good{color:var(--low)}.score-num.warn{color:var(--medium)}.score-num.danger{color:var(--critical)}
.score-of{font-size:10px;color:var(--muted)}
.score-label{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px}
.score-desc{font-size:12px;color:var(--text2);line-height:1.5}

.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 16px;box-shadow:var(--shadow);border-top:3px solid transparent}
.stat-card.c{border-top-color:var(--critical)}.stat-card.h{border-top-color:var(--high)}
.stat-card.m{border-top-color:var(--medium)}.stat-card.r{border-top-color:var(--resolved)}
.s-label{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.s-val{font-size:30px;font-weight:700;font-family:var(--mono);line-height:1;margin-bottom:3px}
.stat-card.c .s-val{color:var(--critical)}.stat-card.h .s-val{color:var(--high)}
.stat-card.m .s-val{color:var(--medium)}.stat-card.r .s-val{color:var(--resolved)}
.s-tag{font-size:11px;color:var(--muted)}

/* CHARTS */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.card-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:14px}

/* TREND */
.trend-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:18px;margin-bottom:18px;box-shadow:var(--shadow)}
.trend-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.trend-title{font-size:13px;font-weight:600;color:var(--text)}
.trend-meta{font-size:11px;color:var(--muted)}
.trend-no-data{font-size:12px;color:var(--muted);text-align:center;padding:40px}
.trend-legend{display:flex;gap:14px;margin-top:10px}
.tl-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)}
.tl-dot{width:10px;height:3px;border-radius:2px}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:12px}
.tab{padding:8px 16px;font-size:13px;font-weight:500;color:var(--muted);background:transparent;
  border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-family:var(--sans)}
.tab:hover{color:var(--text)}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.tcnt{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;
  border-radius:100px;font-size:10px;font-weight:600;margin-left:5px;padding:0 4px}
.tcnt.ok{background:var(--surface2);color:var(--muted)}
.tcnt.bad{background:var(--critical-bg);color:var(--critical)}

/* TABLE */
.tbl-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.tbl-cnt{font-size:12px;color:var(--muted)}
.filters{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.fsep{width:1px;height:14px;background:var(--border2);margin:0 2px}
.chip{padding:3px 10px;border-radius:100px;border:1px solid var(--border);background:transparent;
  color:var(--text2);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;font-family:var(--sans)}
.chip:hover{background:var(--surface2)}
.chip.on{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.chip.c.on{border-color:var(--critical);color:var(--critical);background:var(--critical-bg)}
.chip.h.on{border-color:var(--high);color:var(--high);background:var(--high-bg)}
.chip.m.on{border-color:var(--medium);color:var(--medium);background:var(--medium-bg)}

.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--surface2);border-bottom:1px solid var(--border)}
th{padding:9px 14px;text-align:left;font-size:10px;font-weight:600;letter-spacing:.05em;
  text-transform:uppercase;color:var(--muted);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
tbody tr:hover{background:var(--surface2)}
tbody tr:last-child{border-bottom:none}
td{padding:9px 14px;font-size:12px;color:var(--text);vertical-align:middle}
.mono{font-family:var(--mono);font-size:11px}

.sev{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.sev::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}
.sev.CRITICAL{background:var(--critical-bg);color:var(--critical)}
.sev.HIGH{background:var(--high-bg);color:var(--high)}
.sev.MEDIUM{background:var(--medium-bg);color:var(--medium)}
.sev.LOW{background:var(--low-bg);color:var(--low)}

.st-open{font-size:11px;font-weight:600;color:var(--critical)}
.st-res{font-size:11px;font-weight:600;color:var(--resolved)}

.age{display:inline-flex;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:500;font-family:var(--mono)}
.age.fresh{background:var(--low-bg);color:var(--low)}
.age.warn{background:var(--medium-bg);color:var(--medium)}
.age.old{background:var(--high-bg);color:var(--high)}
.age.crit{background:var(--critical-bg);color:var(--critical)}

.abtn{padding:4px 10px;border-radius:var(--r-sm);font-size:11px;font-weight:500;
  cursor:pointer;border:1px solid;transition:all .15s;font-family:var(--sans);white-space:nowrap}
.abtn-rem{color:var(--accent);border-color:var(--accent);background:var(--accent-bg)}
.abtn-rem:hover{background:var(--accent);color:#fff}
.abtn-roll{color:var(--resolved);border-color:var(--resolved);background:var(--resolved-bg)}
.abtn-roll:hover{background:var(--resolved);color:#fff}
.abtn-pend{color:var(--muted);border-color:var(--border);background:transparent;cursor:default}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(3px);
  z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:24px;width:100%;max-width:480px;box-shadow:var(--shadow-md)}
.modal-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px}
.modal-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:5px}
.modal-x{background:transparent;border:1px solid var(--border);color:var(--muted);
  width:26px;height:26px;border-radius:var(--r-sm);cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;transition:all .15s}
.modal-x:hover{border-color:var(--critical);color:var(--critical)}
.mrow{display:flex;justify-content:space-between;align-items:flex-start;
  padding:9px 0;border-bottom:1px solid var(--border);gap:16px}
.mrow:last-of-type{border-bottom:none}
.mkey{font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);flex-shrink:0}
.mval{font-size:11px;font-family:var(--mono);color:var(--text);text-align:right;word-break:break-all}
.info-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);
  padding:11px;margin:12px 0;font-size:12px;color:var(--text2);line-height:1.6}
.info-box-label{font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.warn-box{background:var(--high-bg);border:1px solid rgba(234,88,12,.25);border-radius:var(--r-sm);
  padding:11px;margin-bottom:12px;font-size:12px;color:var(--high);line-height:1.6}
.roll-box{background:var(--resolved-bg);border:1px solid rgba(124,58,237,.2);border-radius:var(--r-sm);
  padding:11px;margin-bottom:12px;font-size:12px;color:var(--resolved);line-height:1.6}
.mactions{display:flex;gap:8px;margin-top:18px}
.mbtn{flex:1;padding:9px;border-radius:var(--r-sm);font-size:13px;font-weight:600;
  cursor:pointer;transition:all .15s;font-family:var(--sans);border:1px solid var(--border)}
.mbtn.cancel{background:transparent;color:var(--text2)}
.mbtn.cancel:hover{background:var(--surface2)}
.mbtn.go{background:var(--accent);border-color:var(--accent);color:#fff}
.mbtn.go:hover{opacity:.9}
.mbtn.go.danger{background:var(--critical);border-color:var(--critical)}
.mbtn.go.purple{background:var(--resolved);border-color:var(--resolved)}
.mbtn:disabled{opacity:.5;cursor:not-allowed}

/* TOAST */
.toast-wrap{position:fixed;bottom:18px;right:18px;z-index:300;display:flex;flex-direction:column;gap:7px}
.toast{padding:11px 15px;border-radius:var(--r);font-size:13px;box-shadow:var(--shadow-md);
  display:flex;align-items:center;gap:9px;min-width:260px;
  background:var(--surface);border:1px solid var(--border);animation:tin .2s ease}
.toast.success{border-left:3px solid var(--low)}
.toast.error{border-left:3px solid var(--critical)}
.toast.info{border-left:3px solid var(--accent)}
@keyframes tin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* SETTINGS in drawer */
.srow{padding:14px 0;border-bottom:1px solid var(--border)}
.srow:last-child{border-bottom:none}
.slabel{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px}
.sdesc{font-size:12px;color:var(--text2);line-height:1.5}
.swarn{font-size:11px;color:var(--high);margin-top:4px}
.sctrl{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.toggle{position:relative;width:38px;height:21px;cursor:pointer;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.tog-track{position:absolute;inset:0;background:var(--border2);border-radius:100px;transition:background .2s}
.toggle input:checked + .tog-track{background:var(--accent)}
.tog-thumb{position:absolute;top:3px;left:3px;width:15px;height:15px;background:#fff;
  border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle input:checked ~ .tog-thumb{transform:translateX(17px)}
.tog-label{font-size:12px;font-weight:500}
.tog-label.on{color:var(--accent)}.tog-label.off{color:var(--muted)}

.excl-row{display:flex;gap:7px;margin-top:10px;margin-bottom:8px}
.excl-sel{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:7px 10px;font-size:12px;border-radius:var(--r-sm);outline:none;font-family:var(--sans)}
.excl-sel:focus{border-color:var(--accent)}
.btn-add{padding:7px 12px;background:var(--accent);border:none;color:#fff;
  border-radius:var(--r-sm);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--sans)}
.btn-add:disabled{opacity:.4;cursor:not-allowed}
.excl-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.excl-tag{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;
  background:var(--accent-bg);border:1px solid rgba(37,99,235,.25);border-radius:100px;
  font-size:11px;color:var(--accent)}
.excl-tag button{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:12px;line-height:1}
.excl-tag button:hover{color:var(--critical)}

/* AUDIT in drawer */
.aentry{padding:11px 0;border-bottom:1px solid var(--border)}
.aentry:last-child{border-bottom:none}
.aentry-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.abadge{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600}
.abadge.REMEDIATED,.abadge.AUTO_REMEDIATED{background:var(--low-bg);color:var(--low)}
.abadge.ROLLED_BACK{background:var(--resolved-bg);color:var(--resolved)}
.abadge.AUTO_RESOLVED{background:var(--accent-bg);color:var(--accent)}
.abadge.CONFIG_CHANGED{background:var(--medium-bg);color:var(--medium)}
.abadge.FAILED{background:var(--critical-bg);color:var(--critical)}
.atime{font-size:10px;color:var(--muted)}
.arule{font-size:12px;font-family:var(--mono);color:var(--text);margin-top:2px}
.aactor{font-size:11px;color:var(--muted)}

/* STATES */
.center{display:flex;align-items:center;justify-content:center;padding:44px;font-size:12px;color:var(--muted);gap:8px}
.spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.spinner-sm{width:9px;height:9px;border:1.5px solid transparent;border-top-color:currentColor;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:36px 32px;width:100%;max-width:380px;box-shadow:var(--shadow-md)}
.login-logo{width:38px;height:38px;background:var(--accent);border-radius:9px;color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;margin-bottom:18px}
.login-h{font-size:21px;font-weight:700;color:var(--text);margin-bottom:4px}
.login-sub{font-size:12px;color:var(--muted);margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.flabel{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;margin-top:12px}
.finput{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:9px 12px;font-size:14px;border-radius:var(--r-sm);outline:none;transition:border-color .15s;font-family:var(--sans)}
.finput:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.09)}
.login-btn{width:100%;margin-top:18px;padding:10px;background:var(--accent);color:#fff;border:none;
  border-radius:var(--r-sm);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--sans)}
.login-btn:hover{opacity:.9}.login-btn:disabled{opacity:.5;cursor:not-allowed}
.alert{padding:9px 12px;border-radius:var(--r-sm);font-size:12px;margin-top:12px}
.alert-err{background:var(--critical-bg);border:1px solid rgba(220,38,38,.2);color:var(--critical)}
.alert-info{background:var(--accent-bg);border:1px solid rgba(37,99,235,.2);color:var(--accent)}

.fade-in{animation:fi .3s ease both}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const CONFIG = {
  REGION:    "ap-south-1",
  POOL_ID:   "ap-south-1_zgDedrW1K",
  CLIENT_ID: "3ls1bn9nuka7ugcmllpjo1qqno",
  API_URL:   "https://3opsd5jh0d.execute-api.ap-south-1.amazonaws.com/prod",
};
const IS_DEMO = CONFIG.CLIENT_ID.includes("XXX");

const cognitoCall = (target, body) =>
  fetch(`https://cognito-idp.${CONFIG.REGION}.amazonaws.com/`, {
    method:"POST",
    headers:{"Content-Type":"application/x-amz-json-1.1","X-Amz-Target":`AWSCognitoIdentityProviderService.${target}`},
    body:JSON.stringify(body)
  }).then(async r=>{ const d=await r.json(); if(!r.ok) throw d; return d; });

const cognitoLogin  = (u,p)   => cognitoCall("InitiateAuth",{AuthFlow:"USER_PASSWORD_AUTH",ClientId:CONFIG.CLIENT_ID,AuthParameters:{USERNAME:u,PASSWORD:p}});
const cognitoSetPwd = (u,p,s) => cognitoCall("RespondToAuthChallenge",{ChallengeName:"NEW_PASSWORD_REQUIRED",ClientId:CONFIG.CLIENT_ID,Session:s,ChallengeResponses:{USERNAME:u,NEW_PASSWORD:p}});

const fmt    = ts => ts ? new Date(ts).toLocaleString()   : "—";
const fmtDay = ts => ts ? new Date(ts).toLocaleDateString(): "—";
const scoreCls = s => s>=80?"good":s>=50?"warn":"danger";
const SEV_ORDER = ["CRITICAL","HIGH","MEDIUM","LOW"];

function getSevColor(name, dark) {
  const light={CRITICAL:"#dc2626",HIGH:"#ea580c",MEDIUM:"#ca8a04",LOW:"#16a34a"};
  const dk   ={CRITICAL:"#f87171",HIGH:"#fb923c",MEDIUM:"#fbbf24",LOW:"#4ade80"};
  return (dark?dk:light)[name];
}
const SVC_COLOR={IAM:"#2563eb",S3:"#ea580c",SG:"#dc2626",CT:"#16a34a"};

function downsample(data) {
  if(!data||!data.length) return [];
  const b={};
  for(const d of data){
    const k=(d.timestamp||d.date||"").slice(0,13);
    if(!b[k]) b[k]={k,rows:[]};
    b[k].rows.push(d);
  }
  return Object.values(b).sort((a,x)=>a.k.localeCompare(x.k)).map(({k,rows})=>({
    date:rows[rows.length-1].date,ts:k,
    posture_score:Math.round(rows.reduce((s,r)=>s+(r.posture_score||0),0)/rows.length),
    total_findings:Math.max(...rows.map(r=>r.total_findings||0)),
    critical:Math.max(...rows.map(r=>r.critical||0)),
    high:Math.max(...rows.map(r=>r.high||0)),
    medium:Math.max(...rows.map(r=>r.medium||0)),
    low:Math.max(...rows.map(r=>r.low||0)),
    _n:rows.length,
  }));
}

/* ── Charts ── */
function BarChart({data, dark}) {
  const W=300,H=130,pl=26,pb=26,pt=6,pr=6,iW=W-pl-pr,iH=H-pt-pb;
  const max=Math.max(...data.map(d=>d.value),1);
  const gap=iW/data.length,bw=gap*0.55;
  const gc=dark?"rgba(255,255,255,.05)":"rgba(0,0,0,.05)";
  const lc=dark?"#3d4f67":"#94a3b8";
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`}>
      {[0,Math.ceil(max/2),max].map(t=>{const y=pt+iH-(t/max)*iH;return <g key={t}>
        <line x1={pl} y1={y} x2={pl+iW} y2={y} stroke={gc} strokeWidth="1"/>
        <text x={pl-3} y={y+4} textAnchor="end" fill={lc} fontSize="9" fontFamily="JetBrains Mono">{t}</text>
      </g>;})}
      {data.map((d,i)=>{
        const c=getSevColor(d.name,dark)||SVC_COLOR[d.name]||"#2563eb";
        const bh=Math.max((d.value/max)*iH,0),x=pl+i*gap+(gap-bw)/2,y=pt+iH-bh;
        return <g key={d.name}>
          <rect x={x} y={y} width={bw} height={bh} fill={c} rx="3" opacity="0.85"/>
          <text x={x+bw/2} y={pt+iH+15} textAnchor="middle" fill={lc} fontSize="9" fontFamily="JetBrains Mono">{d.name}</text>
          {d.value>0&&<text x={x+bw/2} y={y-4} textAnchor="middle" fill={c} fontSize="9" fontFamily="JetBrains Mono" fontWeight="500">{d.value}</text>}
        </g>;
      })}
    </svg>
  );
}

function DonutChart({data, dark}) {
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total) return <div className="center" style={{padding:28,fontSize:12}}>No data</div>;
  const cx=76,cy=76,r=56,ir=36; let a=-Math.PI/2;
  const slices=data.filter(d=>d.value>0).map(d=>{
    const c=getSevColor(d.name,dark)||SVC_COLOR[d.name]||"#2563eb";
    const sw=(d.value/total)*2*Math.PI,x1=cx+r*Math.cos(a),y1=cy+r*Math.sin(a);
    a+=sw;
    const x2=cx+r*Math.cos(a),y2=cy+r*Math.sin(a),lg=sw>Math.PI?1:0;
    const ix1=cx+ir*Math.cos(a-sw),iy1=cy+ir*Math.sin(a-sw),ix2=cx+ir*Math.cos(a),iy2=cy+ir*Math.sin(a);
    return{path:`M${x1} ${y1}A${r} ${r} 0 ${lg} 1 ${x2} ${y2}L${ix2} ${iy2}A${ir} ${ir} 0 ${lg} 0 ${ix1} ${iy1}Z`,
      fill:c,name:d.name,pct:Math.round(d.value/total*100)};
  });
  const bg=dark?"#161b27":"#fff";
  const tc=dark?"#8b9ab0":"#94a3b8";
  const tb=dark?"#e2e8f0":"#0f172a";
  return (
    <div style={{display:"flex",alignItems:"center",gap:18}}>
      <svg width="152" height="152" viewBox="0 0 152 152" style={{flexShrink:0}}>
        {slices.map((s,i)=><path key={i} d={s.path} fill={s.fill} opacity="0.9"/>)}
        <circle cx={cx} cy={cy} r={ir} fill={bg}/>
        <text x={cx} y={cy+4} textAnchor="middle" fill={tb} fontSize="14" fontFamily="JetBrains Mono" fontWeight="600">{total}</text>
        <text x={cx} y={cy+15} textAnchor="middle" fill={tc} fontSize="8" fontFamily="Inter">total</text>
      </svg>
      <div style={{display:"flex",flexDirection:"column",gap:7,flex:1}}>
        {slices.map((s,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:7}}>
            <div style={{width:9,height:9,borderRadius:"50%",background:s.fill,flexShrink:0}}/>
            <span style={{fontSize:12,color:dark?"#e2e8f0":"#0f172a",flex:1}}>{s.name}</span>
            <span style={{fontFamily:"JetBrains Mono",fontSize:11,color:tc}}>{s.pct}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function Ring({score}) {
  const r=38,circ=2*Math.PI*r;
  const color=score>=80?"#16a34a":score>=50?"#ca8a04":"#dc2626";
  return (
    <div className="score-ring">
      <svg width="84" height="84" viewBox="0 0 84 84">
        <circle cx="42" cy="42" r={r} fill="none" stroke="var(--border2)" strokeWidth="6"/>
        <circle cx="42" cy="42" r={r} fill="none" stroke={color} strokeWidth="6"
          strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={circ*(1-score/100)}
          style={{transition:"stroke-dashoffset 1s ease"}}/>
      </svg>
      <div className="score-center">
        <span className={`score-num ${scoreCls(score)}`}>{score}</span>
        <span className="score-of">/100</span>
      </div>
    </div>
  );
}

function TrendChart({data:raw, dark}) {
  const [mode,setMode]=useState("score");
  const data=downsample(raw);
  if(!data||!data.length) return <div className="trend-no-data">No data yet — run a scan to start tracking.</div>;
  const W=700,H=150,P={t:10,r:10,b:26,l:34};
  const iW=W-P.l-P.r,iH=H-P.t-P.b;
  const xp=i=>P.l+(i/Math.max(data.length-1,1))*iW;
  const gc=dark?"rgba(255,255,255,.04)":"rgba(0,0,0,.04)";
  const lc=dark?"#3d4f67":"#94a3b8";
  const sc=dark?"#3b82f6":"#2563eb";
  const fc=dark?"#fb923c":"#ea580c";

  const ScoreView=()=>{
    const scores=data.map(d=>d.posture_score);
    const totals=data.map(d=>d.total_findings);
    const mt=Math.max(...totals,1);
    const yS=v=>P.t+iH-(v/100)*iH;
    const yT=v=>P.t+iH-(v/mt)*iH;
    const sp=scores.map((v,i)=>`${i===0?"M":"L"}${xp(i)},${yS(v)}`).join(" ");
    const tp=totals.map((v,i)=>`${i===0?"M":"L"}${xp(i)},${yT(v)}`).join(" ");
    const area=`${sp} L${xp(scores.length-1)},${P.t+iH} L${xp(0)},${P.t+iH} Z`;
    return (<>
      {[0,50,100].map(v=>{const y=yS(v);return <g key={v}>
        <line x1={P.l} y1={y} x2={W-P.r} y2={y} stroke={gc} strokeWidth="1"/>
        <text x={P.l-3} y={y+4} fill={lc} fontSize="9" textAnchor="end" fontFamily="JetBrains Mono">{v}</text>
      </g>;})}
      <path d={area} fill={sc} fillOpacity=".06" stroke="none"/>
      <path d={tp} fill="none" stroke={fc} strokeWidth="1.5" strokeDasharray="5 3" opacity=".7"/>
      <path d={sp} fill="none" stroke={sc} strokeWidth="2"/>
      {data.length<=60&&scores.map((v,i)=>(
        <circle key={i} cx={xp(i)} cy={yS(v)} r="3" fill={sc} stroke={dark?"#161b27":"#fff"} strokeWidth="1.5">
          <title>{data[i].ts}: {v}/100</title>
        </circle>
      ))}
    </>);
  };

  const SevView=()=>{
    const series=[{k:"critical"},{k:"high"},{k:"medium"},{k:"low"}];
    const mv=Math.max(...data.flatMap(d=>series.map(s=>d[s.k]||0)),1);
    const yV=v=>P.t+iH-(v/mv)*iH;
    const gv=Array.from({length:4},(_,i)=>Math.round((mv/3)*i));
    return (<>
      {gv.map(v=>{const y=yV(v);return <g key={v}>
        <line x1={P.l} y1={y} x2={W-P.r} y2={y} stroke={gc} strokeWidth="1"/>
        <text x={P.l-3} y={y+4} fill={lc} fontSize="9" textAnchor="end" fontFamily="JetBrains Mono">{v}</text>
      </g>;})}
      {series.map(s=>{
        const c=getSevColor(s.k.toUpperCase(),dark);
        const p=data.map((d,i)=>`${i===0?"M":"L"}${xp(i)},${yV(d[s.k]||0)}`).join(" ");
        return <path key={s.k} d={p} fill="none" stroke={c} strokeWidth="1.8" opacity=".9"/>;
      })}
    </>);
  };

  const xLabels=data.filter((_,i)=>data.length<=10||i%Math.ceil(data.length/8)===0);
  return (
    <div>
      <div style={{display:"flex",gap:5,marginBottom:10}}>
        {[["score","Score & Findings"],["severity","By Severity"]].map(([k,l])=>(
          <button key={k} onClick={()=>setMode(k)} style={{
            padding:"3px 11px",border:"1px solid",borderRadius:100,fontSize:11,
            cursor:"pointer",fontFamily:"Inter",transition:"all .15s",
            background:mode===k?"var(--accent)":"transparent",
            borderColor:mode===k?"var(--accent)":"var(--border)",
            color:mode===k?"#fff":"var(--text2)",
          }}>{l}</button>
        ))}
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto"}}>
        {mode==="score"?<ScoreView/>:<SevView/>}
        {xLabels.map(d=>{const i=data.indexOf(d);return(
          <text key={i} x={xp(i)} y={H-4} fill={lc} fontSize="9" textAnchor="middle" fontFamily="JetBrains Mono">
            {d.date?.slice(5)}
          </text>
        );})}
      </svg>
      {mode==="score"&&(
        <div className="trend-legend">
          <div className="tl-item"><div className="tl-dot" style={{background:sc}}/> Posture score</div>
          <div className="tl-item"><div className="tl-dot" style={{background:fc,opacity:.7}}/> Total findings</div>
        </div>
      )}
    </div>
  );
}

/* ── Login ── */
function Login({onLogin}) {
  const [email,setEmail]=useState(""),[pass,setPass]=useState("");
  const [newPass,setNewPass]=useState(""),[confirm,setConfirm]=useState("");
  const [phase,setPhase]=useState("login"),[session,setSession]=useState(null);
  const [err,setErr]=useState(""),[busy,setBusy]=useState(false);
  const submit=async()=>{
    setErr("");setBusy(true);
    try{
      if(IS_DEMO){if(!email||!pass){setErr("Enter any email + password.");setBusy(false);return;}onLogin({email,token:"demo"});return;}
      if(phase==="login"){
        const d=await cognitoLogin(email,pass);
        if(d.ChallengeName==="NEW_PASSWORD_REQUIRED"){setSession(d.Session);setPhase("newpass");}
        else if(d.AuthenticationResult){localStorage.setItem("cspm_tok",d.AuthenticationResult.IdToken);onLogin({email,token:d.AuthenticationResult.IdToken});}
      }else{
        if(newPass!==confirm){setErr("Passwords don't match.");setBusy(false);return;}
        const d=await cognitoSetPwd(email,newPass,session);
        if(d.AuthenticationResult){localStorage.setItem("cspm_tok",d.AuthenticationResult.IdToken);onLogin({email,token:d.AuthenticationResult.IdToken});}
      }
    }catch(e){setErr(e.message||e.__type||"Authentication failed.");}
    setBusy(false);
  };
  const onKey=e=>e.key==="Enter"&&submit();
  return (
    <div className="login-wrap">
      <div className="login-box">
        <div className="login-logo">C</div>
        <div className="login-h">CSPM Dashboard</div>
        <div className="login-sub">{IS_DEMO?"Demo mode · no real AWS calls":`${CONFIG.REGION.toUpperCase()} · Cognito`}</div>
        {err&&<div className="alert alert-err">⚠ {err}</div>}
        {phase==="newpass"&&<div className="alert alert-info">First sign-in — set a permanent password.</div>}
        {phase==="login"?<>
          <label className="flabel">Email</label>
          <input className="finput" type="email" value={email} autoFocus onChange={e=>setEmail(e.target.value)} onKeyDown={onKey} placeholder="you@example.com"/>
          <label className="flabel">Password</label>
          <input className="finput" type="password" value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={onKey} placeholder="••••••••"/>
        </>:<>
          <label className="flabel">New Password</label>
          <input className="finput" type="password" value={newPass} autoFocus onChange={e=>setNewPass(e.target.value)} onKeyDown={onKey}/>
          <label className="flabel">Confirm</label>
          <input className="finput" type="password" value={confirm} onChange={e=>setConfirm(e.target.value)} onKeyDown={onKey}/>
        </>}
        <button className="login-btn" onClick={submit} disabled={busy}>{busy?"Signing in…":phase==="login"?"Sign in":"Set password"}</button>
      </div>
    </div>
  );
}

  const isCrit=finding.severity==="CRITICAL"&&isR;
  return (
    <div className="overlay" onClick={onCancel}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <div><div className="modal-title">{isR?"Confirm Remediation":"Confirm Rollback"}</div><span className={`sev ${finding.severity}`}>{finding.severity}</span></div>
          <button className="modal-x" onClick={onCancel}>✕</button>
        </div>
        {isCrit&&<div className="warn-box">⚠ Critical severity — an approval email will be sent to your SNS address. The fix only runs after you approve.</div>}
        {isRb&&<div className="roll-box">↩ This restores the previous AWS configuration. The finding will be re-opened.</div>}
        {[["Rule",finding.rule_id],["Resource",finding.resource_id],["Service",finding.service]].map(([k,v])=>(

        <div className="mactions">
          <button className="mbtn cancel" onClick={onCancel} disabled={busy}>Cancel</button>
          <button className={`mbtn go${isRb?" purple":isCrit?" danger":""}`} onClick={onConfirm} disabled={busy}>

}

  const [dark,setDark]=useState(()=>localStorage.getItem("cspm_theme")==="dark");
  const [drawer,setDrawer]=useState(null);
  const [auditLogs,setAuditLogs]=useState([]),[auditLoading,setAuditLoading]=useState(false);
  const [autoRemediate,setAutoRemediate]=useState(false);
  const [exclusions,setExclusions]=useState([]),[newExcl,setNewExcl]=useState("");
  const [cfgBusy,setCfgBusy]=useState(false);
  const [scanBusy,setScanBusy]=useState(false);

  useEffect(()=>{document.body.classList.toggle("dark",dark);localStorage.setItem("cspm_theme",dark?"dark":"light");},[dark]);

  const addToast=(msg,type="success")=>{const id=++toastId.current;setToasts(t=>[...t,{id,msg,type}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),4000);};

  const load=useCallback(async()=>{
    setLoading(true);
    if(IS_DEMO){await new Promise(r=>setTimeout(r,600));setSum(MOCK_SUM);setFinds(MOCK_FINDS);setLastScan(new Date().toISOString());setLoading(false);return;}
    try{
      const h={Authorization:user.token};
      const [s,f]=await Promise.all([
        fetch(`${CONFIG.API_URL}/summary`,{headers:h}).then(r=>r.json()),
        fetch(`${CONFIG.API_URL}/findings`,{headers:h}).then(r=>r.json()),
      ]);
      setSum(s);setFinds(f.findings||[]);setLastScan(new Date().toISOString());
    }catch(e){addToast("Failed to load data","error");}
    setLoading(false);
  },[user.token]);

  useEffect(()=>{load();},[load]);

  useEffect(()=>{
    if(IS_DEMO){
      const base=Date.now()-7*86400000;
      setTrends(Array.from({length:8},(_,i)=>({date:new Date(base+i*86400000).toISOString().slice(0,10),posture_score:Math.min(100,45+i*4+Math.floor(Math.random()*5)),total_findings:Math.max(5,14-i+Math.floor(Math.random()*3)),critical:Math.max(0,2-Math.floor(i/3)),high:Math.max(0,5-Math.floor(i/2)),medium:Math.max(0,4-Math.floor(i/4)),low:Math.max(0,3-Math.floor(i/5))})));
      return;
    }
    fetch(`${CONFIG.API_URL}/trends`,{headers:{Authorization:user.token}}).then(r=>r.json()).then(d=>setTrends(d.trends||[])).catch(console.error);
  },[user.token]);

  useEffect(()=>{
    if(IS_DEMO)return;
    fetch(`${CONFIG.API_URL}/config`,{headers:{Authorization:user.token}}).then(r=>r.json()).then(d=>{setAutoRemediate(d.auto_remediate);setExclusions(d.exclusions||[]);}).catch(console.error);
  },[user.token]);

  const saveConfig=async(ar,ex)=>{
    if(IS_DEMO){addToast("Demo mode","info");return;}
    setCfgBusy(true);
    try{await fetch(`${CONFIG.API_URL}/config`,{method:"POST",headers:{Authorization:user.token,"Content-Type":"application/json"},body:JSON.stringify({auto_remediate:ar,exclusions:ex})});addToast("Saved","success");}
    catch(e){addToast("Save failed","error");}
    setCfgBusy(false);
  };

  const loadAudit=async()=>{
    if(IS_DEMO){setAuditLogs([{audit_id:"1",timestamp:"2026-02-24T14:00:00Z",action:"REMEDIATED",rule_id:"IAM_ADMIN",resource_id:"admin-user",actor:"you@example.com",status:"SUCCESS"},{audit_id:"2",timestamp:"2026-02-24T13:00:00Z",action:"CONFIG_CHANGED",rule_id:"N/A",resource_id:"AUTO_REMEDIATE",actor:"dashboard-user",status:"SUCCESS"}]);return;}
    setAuditLoading(true);
    try{const r=await fetch(`${CONFIG.API_URL}/audit`,{headers:{Authorization:user.token}});setAuditLogs((await r.json()).logs||[]);}
    catch{}
    setAuditLoading(false);
  };

  const toggleAR=async()=>{const n=!autoRemediate;setAutoRemediate(n);await saveConfig(n,exclusions);};
  const addExcl=async()=>{if(!newExcl.trim())return;const n=[...new Set([...exclusions,newExcl.trim()])];setExclusions(n);setNewExcl("");await saveConfig(autoRemediate,n);};
  const rmExcl=async(r)=>{const n=exclusions.filter(e=>e!==r);setExclusions(n);await saveConfig(autoRemediate,n);};

  const apiCall=async(ep,body)=>{
    if(IS_DEMO)return{message:"Demo"};
    const r=await fetch(`${CONFIG.API_URL}/${ep}`,{method:"POST",headers:{Authorization:user.token,"Content-Type":"application/json"},body:JSON.stringify(body)});
    return r.json();
  };

  const handleRemediate=async()=>{
    const f=confirm.finding;setActionBusy(true);
    try{
      await apiCall("remediate",{finding_id:f.finding_id});
      setPendingIds(s=>new Set([...s,f.finding_id]));
      addToast(f.severity==="CRITICAL"?"Approval email sent":"Remediation started",f.severity==="CRITICAL"?"info":"success");
      setConfirm(null);
      setTimeout(()=>{load();setPendingIds(s=>{const n=new Set(s);n.delete(f.finding_id);return n;});},3000);
    }catch(e){addToast("Remediation failed: "+e.message,"error");}
    setActionBusy(false);
  };

  const handleRollback=async()=>{
    const f=confirm.finding;setActionBusy(true);
    try{await apiCall("rollback",{finding_id:f.finding_id});addToast("Rolled back","success");setConfirm(null);setTimeout(load,2000);}
    catch(e){addToast("Rollback failed","error");}
    setActionBusy(false);
  };

  const handleScan=async()=>{
    if(IS_DEMO){addToast("Demo mode","info");return;}
    setScanBusy(true);
    try{
      const res=await fetch(`${CONFIG.API_URL}/scan`,{method:"POST",headers:{Authorization:user.token,"Content-Type":"application/json"},body:"{}"});
      if(!res.ok){const e=await res.json().catch(()=>({error:`HTTP ${res.status}`}));throw new Error(e.error||`HTTP ${res.status}`);}
      addToast("Scan triggered — results in ~30s","success");
      setTimeout(()=>{load();setScanBusy(false);},32000);
    }catch(e){console.error(e);addToast("Scan failed: "+e.message,"error");setScanBusy(false);}
  };

  const openF=finds.filter(f=>f.status==="OPEN");
  const resF=finds.filter(f=>f.status==="RESOLVED");
  const filtered=(tab==="open"?openF:resF).filter(f=>(sevF==="ALL"||f.severity===sevF)&&(svcF==="ALL"||f.service===svcF));
  const score=sum?.posture_score??0;
  const sevData=SEV_ORDER.map(s=>({name:s,value:sum?.severity_counts?.[s]??0}));
  const svcData=Object.entries(sum?.service_counts??{}).map(([n,v])=>({name:n,value:v}));
  const tog=(cur,set,v)=>set(c=>c===v?"ALL":v);
  const scoreDesc=score>=80?"Account posture is healthy":score>=50?"Some issues need attention":"Critical issues require immediate action";

  const openDrawer=name=>{setDrawer(d=>d===name?null:name);if(name==="audit"&&drawer!=="audit")loadAudit();};

  return (<>
    <nav>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div className="nav-brand"><div className="nav-logo">C</div>CSPM</div>
        <div className="live-pill"><div className="live-dot"/>Live</div>
        {lastScan&&<span className="nav-meta" style={{marginLeft:6}}>Updated {new Date(lastScan).toLocaleTimeString()}{IS_DEMO?" · Demo":""}</span>}
      </div>
      <div className="nav-right">
        <span className="nav-email">{user.email}</span>
        <div className="ndiv"/>
        <button className="nbtn accent" onClick={handleScan} disabled={scanBusy}>
          {scanBusy?<><span className="spinner-sm" style={{marginRight:5}}/>Scanning…</>:"⟳ Scan Now"}
        </button>
        <button className="nbtn" onClick={load}>Refresh</button>
        <div className="ndiv"/>
        <button className={`nbtn${drawer==="settings"?" active":""}`} onClick={()=>openDrawer("settings")}>⚙ Settings</button>
        <button className={`nbtn${drawer==="audit"?" active":""}`} onClick={()=>openDrawer("audit")}>Audit Log</button>
        <div className="ndiv"/>
        <button className="nbtn" onClick={()=>setDark(d=>!d)}>{dark?"☀ Light":"🌙 Dark"}</button>
        <button className="nbtn" onClick={onLogout}>Sign out</button>
      </div>
    </nav>

    <div className="app-body">
      <main>
        {/* Score + stats */}
        <div className="banner fade-in">
          <div className="score-card">
            <Ring score={score}/>
            <div><div className="score-label">Security Posture</div><div className="score-desc">{scoreDesc}</div></div>
          </div>
          <div className="stat-grid">
            {[{l:"Critical",v:sum?.severity_counts?.CRITICAL??0,c:"c"},{l:"High",v:sum?.severity_counts?.HIGH??0,c:"h"},{l:"Medium",v:sum?.severity_counts?.MEDIUM??0,c:"m"},{l:"Resolved",v:sum?.status_counts?.RESOLVED??0,c:"r"}].map(({l,v,c})=>(
              <div key={c} className={`stat-card ${c} fade-in`}>
                <div className="s-label">{l}</div>
                <div className="s-val">{v}</div>
                <div className="s-tag">{c==="r"?"findings fixed":"open findings"}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Trend */}
        <div className="trend-card fade-in">
          <div className="trend-header">
            <div className="trend-title">Security Posture Over Time</div>
            <div className="trend-meta">{downsample(trends).length} hourly points · {trends.length} raw scans</div>
          </div>
          <TrendChart data={trends} dark={dark}/>
        </div>

        {/* Charts */}
        <div className="charts-row fade-in">
          <div className="card"><div className="card-title">Findings by Severity</div><BarChart data={sevData} dark={dark}/></div>
          <div className="card"><div className="card-title">Exposure by Service</div><DonutChart data={svcData} dark={dark}/></div>
        </div>

        {/* Findings table */}
        <div className="fade-in">
          <div className="tabs">
            <button className={`tab ${tab==="open"?"on":""}`} onClick={()=>setTab("open")}>
              Open <span className={`tcnt ${openF.length>0?"bad":"ok"}`}>{openF.length}</span>
            </button>
            <button className={`tab ${tab==="resolved"?"on":""}`} onClick={()=>setTab("resolved")}>
              Resolved <span className="tcnt ok">{resF.length}</span>
            </button>
          </div>
          <div className="tbl-bar">
            <div className="tbl-cnt">{filtered.length} finding{filtered.length!==1?"s":""}</div>
            <div className="filters">
              {["CRITICAL","HIGH","MEDIUM","LOW"].map(s=>(
                <button key={s} className={`chip ${s[0].toLowerCase()} ${sevF===s?"on":""}`} onClick={()=>tog(sevF,setSevF,s)}>{s}</button>
              ))}
              <div className="fsep"/>
              {["IAM","S3","SG","CT"].map(s=>(
                <button key={s} className={`chip ${svcF===s?"on":""}`} onClick={()=>tog(svcF,setSvcF,s)}>{s}</button>
              ))}
            </div>
          </div>
          <div className="tbl-wrap">
            {loading?<div className="center"><div className="spinner"/>Loading…</div>
             :filtered.length===0?<div className="center">No findings{sevF!=="ALL"||svcF!=="ALL"?" for this filter":""}</div>
             :<table>
               <thead><tr><th>Severity</th><th>Rule</th><th>Resource</th><th>Service</th><th>Status</th><th>Age</th><th>First seen</th><th>Action</th></tr></thead>
               <tbody>
                 {filtered.map(f=>{
                   const ip=pendingIds.has(f.finding_id);
                   const d=f.days_open||0;
                   const ac=d===0?"fresh":d<3?"fresh":d<7?"warn":d<14?"old":"crit";
                   const al=d===0?"today":d===1?"1d":`${d}d`;
                   return (
                     <tr key={f.finding_id} onClick={()=>setSel(f)}>
                       <td><span className={`sev ${f.severity}`}>{f.severity}</span></td>
                       <td><span className="mono">{f.rule_id}</span></td>
                       <td><span className="mono" style={{color:"var(--text)"}}>{f.resource_id}</span></td>
                       <td><span className="mono" style={{color:"var(--text2)"}}>{f.service}</span></td>
                       <td>{f.status==="OPEN"?<span className="st-open">Open</span>:<span className="st-res">Resolved</span>}</td>
                       <td>{f.status==="OPEN"?<span className={`age ${ac}`}>{al}</span>:<span style={{color:"var(--muted)",fontSize:11}}>—</span>}</td>
                       <td><span style={{fontSize:11,color:"var(--text2)"}}>{fmtDay(f.first_seen)}</span></td>
                       <td onClick={e=>e.stopPropagation()}>
                         {ip?<button className="abtn abtn-pend" disabled><span className="spinner-sm" style={{marginRight:4}}/>Pending</button>
                           :f.status==="OPEN"&&f.can_remediate?<button className="abtn abtn-rem" onClick={e=>{e.stopPropagation();setConfirm({finding:f,mode:"remediate"});}}>Remediate</button>
                           :f.can_rollback?<button className="abtn abtn-roll" onClick={e=>{e.stopPropagation();setConfirm({finding:f,mode:"rollback"});}}>Rollback</button>
                           :<span style={{fontSize:11,color:"var(--muted)"}}>—</span>}
                       </td>
                     </tr>
                   );
                 })}
               </tbody>
             </table>}
          </div>
        </div>
      </main>

      {/* Right drawer */}
      <div className={`drawer${drawer?"":" closed"}`}>
        {drawer==="settings"&&(<>
          <div className="drawer-head"><div className="drawer-title">Settings</div></div>
          <div className="section-divider">Auto Remediation</div>
          <div className="srow">
            <div className="slabel">Auto-Remediate</div>
            <div className="sdesc">When on, new findings are automatically fixed on the next scan without manual approval.</div>
            {autoRemediate&&<div className="swarn">⚠ Active — findings will be auto-fixed.</div>}
            <div className="sctrl">
              <span className={`tog-label ${autoRemediate?"on":"off"}`}>{autoRemediate?"On":"Off"}</span>
              <label className="toggle">
                <input type="checkbox" checked={autoRemediate} onChange={toggleAR} disabled={cfgBusy}/>
                <div className="tog-track"/><div className="tog-thumb"/>
              </label>
            </div>
          </div>
          <div className="section-divider" style={{marginTop:8}}>Exclusion List</div>
          <div className="srow">
            <div className="sdesc">Resources here are skipped by auto-remediate.</div>
            <div className="excl-row">
              <select className="excl-sel" value={newExcl} onChange={e=>setNewExcl(e.target.value)}>
                <option value="">Select a resource…</option>
                {[...new Set(finds.map(f=>f.resource_id))].filter(r=>!exclusions.includes(r)).sort().map(r=>(
                  <option key={r} value={r}>{r}</option>
                ))}
              </select>
              <button className="btn-add" onClick={addExcl} disabled={!newExcl}>Add</button>
            </div>
            {exclusions.length>0
              ?<div className="excl-tags">{exclusions.map(ex=><span key={ex} className="excl-tag">{ex}<button onClick={()=>rmExcl(ex)}>✕</button></span>)}</div>
              :<div style={{fontSize:12,color:"var(--muted)"}}>No exclusions configured.</div>}
          </div>
          <div style={{fontSize:11,color:"var(--muted)",marginTop:16,lineHeight:1.6}}>
            Region: {CONFIG.REGION}<br/>Pool: {CONFIG.POOL_ID}
          </div>
        </>)}

        {drawer==="audit"&&(<>
          <div className="drawer-head">
            <div className="drawer-title">Audit Log</div>
            <button className="nbtn" style={{fontSize:11,padding:"4px 9px"}} onClick={loadAudit}>↻</button>
          </div>
          {auditLoading?<div className="center"><div className="spinner"/>Loading…</div>
           :auditLogs.length===0?<div style={{fontSize:12,color:"var(--muted)",padding:"16px 0"}}>No audit entries yet.</div>
           :auditLogs.map(log=>(
            <div key={log.audit_id} className="aentry">
              <div className="aentry-top">
                <span className={`abadge ${log.status==="FAILED"?"FAILED":log.action}`}>{log.action?.replace(/_/g," ")}</span>
                <span className="atime">{new Date(log.timestamp).toLocaleString()}</span>
              </div>
              <div className="arule">{log.rule_id!=="N/A"?log.rule_id:log.resource_id}</div>
              <div className="aactor">{log.actor}</div>
            </div>
          ))}
        </>)}
      </div>
    </div>

    {sel&&!confirm&&(
      <DetailModal finding={sel} onClose={()=>setSel(null)}
        onRemediate={f=>setConfirm({finding:f,mode:"remediate"})}
        onRollback={f=>setConfirm({finding:f,mode:"rollback"})}
        exclusions={exclusions}
        onExclude={async r=>{const n=[...new Set([...exclusions,r])];setExclusions(n);await saveConfig(autoRemediate,n);addToast(`${r} excluded`,"info");}}
        onUnexclude={async r=>{const n=exclusions.filter(e=>e!==r);setExclusions(n);await saveConfig(autoRemediate,n);addToast("Exclusion removed","info");}}/>
    )}
    {confirm&&<ConfirmModal finding={confirm.finding} mode={confirm.mode}
      onConfirm={confirm.mode==="remediate"?handleRemediate:handleRollback}
      onCancel={()=>setConfirm(null)} busy={actionBusy}/>}
    <Toasts toasts={toasts}/>
  </>);
}

function App() {
  const [user,setUser]=useState(()=>{const tok=localStorage.getItem("cspm_tok"),em=localStorage.getItem("cspm_em");return tok&&em?{token:tok,email:em}:null;});
  const login=({email,token})=>{localStorage.setItem("cspm_tok",token);localStorage.setItem("cspm_em",email);setUser({email,token});};
  const logout=()=>{localStorage.removeItem("cspm_tok");localStorage.removeItem("cspm_em");setUser(null);};
  return user?<Dashboard user={user} onLogout={logout}/>:<Login onLogin={login}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
