AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Mini CSPM - Scanner Lambda (Audit-only, Free Tier friendly)

Parameters:
  LambdaS3Bucket:
    Type: String
    Description: S3 bucket containing Lambda deployment zip

  LambdaS3Key:
    Type: String
    Description: S3 key for Lambda zip file

Resources:

  # -------------------------
  # IAM Role for Scanner
  # -------------------------
  CSPMScannerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CSPM-ScannerRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole

      Policies:
        - PolicyName: CSPMScannerReadOnlyPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:

              - Effect: Allow
                Action:
                  - s3:ListAllMyBuckets
                  - s3:GetBucketAcl
                  - s3:GetBucketPolicy
                  - s3:GetBucketPublicAccessBlock
                  - s3:GetEncryptionConfiguration
                Resource: "*"

              - Effect: Allow
                Action:
                  - ec2:DescribeSecurityGroups
                Resource: "*"

              - Effect: Allow
                Action:
                  - iam:ListUsers
                  - iam:ListAttachedUserPolicies
                  - iam:GetUser
                  - iam:ListMFADevices
                Resource: "*"

              - Effect: Allow
                Action:
                  - cloudtrail:DescribeTrails
                  - cloudtrail:GetTrailStatus
                Resource: "*"

              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

  # -------------------------
  # Lambda Function
  # -------------------------
  CSPMScannerLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: CSPM-ScannerLambda
      Runtime: python3.11
      Handler: handler.lambda_handler
      Role: !GetAtt CSPMScannerRole.Arn
      Timeout: 60
      MemorySize: 256
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Ref LambdaS3Key

  # -------------------------
  # EventBridge Rule
  # -------------------------
  CSPMScanSchedule:
    Type: AWS::Events::Rule
    Properties:
      Name: CSPM-Periodic-Scan
      ScheduleExpression: rate(6 hours)
      State: ENABLED
      Targets:
        - Arn: !GetAtt CSPMScannerLambda.Arn
          Id: CSPMScannerLambdaTarget

  # Permission for EventBridge to invoke Lambda
  CSPMInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CSPMScannerLambda
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt CSPMScanSchedule.Arn

Outputs:
  LambdaName:
    Description: Scanner Lambda Name
    Value: !Ref CSPMScannerLambda

  EventRuleName:
    Description: EventBridge Rule Name
    Value: !Ref CSPMScanSchedule
